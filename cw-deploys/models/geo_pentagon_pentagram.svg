<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Pentagon and Pentagram</title>
  <desc>Regular pentagon with inscribed pentagram, revealing an inner pentagon. Golden ratio throughout.</desc>
  <!-- Pentagon R=360, first vertex up (-90°). Angles: -90, -18, 54, 126, 198 -->
  <!-- 0: 400+360*cos(-90),  400+360*sin(-90)  = 400.000,  40.000 -->
  <!-- 1: 400+360*cos(-18),  400+360*sin(-18)  = 742.422, 288.537 -->
  <!-- 2: 400+360*cos(54),   400+360*sin(54)   = 611.696, 691.463 -->
  <!-- 3: 400+360*cos(126),  400+360*sin(126)  = 188.304, 691.463 -->
  <!-- 4: 400+360*cos(198),  400+360*sin(198)  =  57.578, 288.537 -->
  <polygon points="400,40 742.422,288.537 611.696,691.463 188.304,691.463 57.578,288.537"
           fill="none" stroke="#555" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Pentagram: 0→2→4→1→3→0 -->
  <polygon points="400,40 611.696,691.463 57.578,288.537 742.422,288.537 188.304,691.463"
           fill="none" stroke="#555" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Inner pentagon: R=360/phi^2 ≈ 137.361, rotated 36°, first vertex at -54° -->
  <!-- 0: 400+137.361*cos(-54),  400+137.361*sin(-54)  = 480.726, 288.826 -->
  <!-- 1: 400+137.361*cos(18),   400+137.361*sin(18)   = 530.598, 442.497 -->
  <!-- 2: 400+137.361*cos(90),   400+137.361*sin(90)   = 400.000, 537.361 -->
  <!-- 3: 400+137.361*cos(162),  400+137.361*sin(162)  = 269.402, 442.497 -->
  <!-- 4: 400+137.361*cos(234),  400+137.361*sin(234)  = 319.274, 288.826 -->
  <polygon points="480.726,288.826 530.598,442.497 400,537.361 269.402,442.497 319.274,288.826"
           fill="none" stroke="#555" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
