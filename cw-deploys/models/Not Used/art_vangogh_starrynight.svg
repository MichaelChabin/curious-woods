<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" width="800" height="533">
  <title>Starry Night — Geometric Armature</title>
  <desc>
    Geometric abstraction of Van Gogh's Starry Night.
    Canvas 800x533 (3:2, matching the painting's proportions).
    Elements: cypress, horizon, rolling hills, sweeping sky wave bands,
    and elliptical whorls suggesting stars and moon.
    All constructible with compass and straightedge.
  </desc>

  <!-- ============================================================ -->
  <!-- HORIZON LINE -->
  <!-- ============================================================ -->
  <line x1="0" y1="309" x2="800" y2="309"
        stroke="#555" stroke-width="1.5"/>

  <!-- ============================================================ -->
  <!-- CYPRESS — left fifth, full height, flame-like vertical -->
  <!-- Approximated as a narrow pointed ellipse, slightly off-center -->
  <!-- ============================================================ -->
  <!-- Main body: tall narrow ellipse -->
  <ellipse cx="112" cy="220" rx="28" ry="185"
           fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- Taper suggestion: second ellipse, slimmer, same center -->
  <ellipse cx="112" cy="200" rx="16" ry="165"
           fill="none" stroke="#555" stroke-width="1.2"/>

  <!-- ============================================================ -->
  <!-- ROLLING HILLS behind village -->
  <!-- Gentle arc from left of village across to right -->
  <!-- ============================================================ -->
  <path d="M 155,309 Q 310,265 460,295 Q 580,315 720,290"
        fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ============================================================ -->
  <!-- VILLAGE — simple rectangular block, centered right -->
  <!-- A few vertical lines suggesting buildings, one spire -->
  <!-- ============================================================ -->
  <!-- Village base block -->
  <rect x="280" y="330" width="320" height="60"
        fill="none" stroke="#555" stroke-width="1.2"/>
  <!-- Church spire -->
  <line x1="390" y1="330" x2="390" y2="270"
        stroke="#555" stroke-width="1.2"/>
  <line x1="370" y1="280" x2="410" y2="280"
        stroke="#555" stroke-width="1.2"/>
  <!-- A few building verticals -->
  <line x1="320" y1="330" x2="320" y2="355"
        stroke="#555" stroke-width="1.0"/>
  <line x1="360" y1="330" x2="360" y2="360"
        stroke="#555" stroke-width="1.0"/>
  <line x1="450" y1="330" x2="450" y2="350"
        stroke="#555" stroke-width="1.0"/>
  <line x1="510" y1="330" x2="510" y2="355"
        stroke="#555" stroke-width="1.0"/>
  <line x1="560" y1="330" x2="560" y2="345"
        stroke="#555" stroke-width="1.0"/>

  <!-- ============================================================ -->
  <!-- SKY WAVE — the great sweeping river of light -->
  <!-- Two bounding curves of the wave band, sweeping left to right -->
  <!-- Upper edge of wave band -->
  <!-- ============================================================ -->
  <path d="M 140,60 C 280,40 460,90 620,60 C 700,45 760,70 800,90"
        fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lower edge of wave band -->
  <path d="M 140,175 C 280,145 460,195 640,165 C 720,150 775,170 800,185"
        fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <!-- A third inner curve suggesting the wave's depth -->
  <path d="M 155,115 C 300,95 470,140 630,110 C 710,96 768,118 800,135"
        fill="none" stroke="#555" stroke-width="1.0" stroke-linecap="round"
        stroke-dasharray="8,6"/>

  <!-- ============================================================ -->
  <!-- WHORLS — concentric ellipses at star/moon positions -->
  <!-- Each whorl: two concentric ellipses, slightly tilted -->
  <!-- ============================================================ -->

  <!-- Moon — top right, largest whorl -->
  <ellipse cx="685" cy="92" rx="52" ry="42" transform="rotate(-10,685,92)"
           fill="none" stroke="#555" stroke-width="1.3"/>
  <ellipse cx="685" cy="92" rx="32" ry="26" transform="rotate(-10,685,92)"
           fill="none" stroke="#555" stroke-width="1.0"/>

  <!-- Bright star — left sky, large -->
  <ellipse cx="200" cy="205" rx="42" ry="34" transform="rotate(-5,200,205)"
           fill="none" stroke="#555" stroke-width="1.3"/>
  <ellipse cx="200" cy="205" rx="24" ry="19" transform="rotate(-5,200,205)"
           fill="none" stroke="#555" stroke-width="1.0"/>

  <!-- Middle stars — smaller whorls scattered across sky -->
  <ellipse cx="330" cy="148" rx="24" ry="19" transform="rotate(-8,330,148)"
           fill="none" stroke="#555" stroke-width="1.2"/>
  <ellipse cx="330" cy="148" rx="13" ry="10" transform="rotate(-8,330,148)"
           fill="none" stroke="#555" stroke-width="1.0"/>

  <ellipse cx="455" cy="118" rx="20" ry="16" transform="rotate(-5,455,118)"
           fill="none" stroke="#555" stroke-width="1.2"/>
  <ellipse cx="455" cy="118" rx="11" ry="9" transform="rotate(-5,455,118)"
           fill="none" stroke="#555" stroke-width="1.0"/>

  <ellipse cx="548" cy="135" rx="17" ry="13"
           fill="none" stroke="#555" stroke-width="1.1"/>
  <ellipse cx="548" cy="135" rx="9" ry="7"
           fill="none" stroke="#555" stroke-width="1.0"/>

  <ellipse cx="615" cy="162" rx="14" ry="11" transform="rotate(5,615,162)"
           fill="none" stroke="#555" stroke-width="1.1"/>
  <ellipse cx="615" cy="162" rx="7" ry="5" transform="rotate(5,615,162)"
           fill="none" stroke="#555" stroke-width="1.0"/>

  <!-- Two smaller stars in lower wave area -->
  <ellipse cx="260" cy="158" rx="11" ry="9"
           fill="none" stroke="#555" stroke-width="1.0"/>
  <ellipse cx="510" cy="175" rx="10" ry="8"
           fill="none" stroke="#555" stroke-width="1.0"/>

</svg>
