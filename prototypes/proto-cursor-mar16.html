<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Vocabulary — CW Prototype</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #f4f1e8;
      font-family: Georgia, serif;
      cursor: none; /* hide native cursor over whole page */
    }

    #canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    /* ── State label ─────────────────────────────────────────── */
    #state-label {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-family: Georgia, serif;
      font-size: 13px;
      font-style: italic;
      color: #9a8e80;
      pointer-events: none;
      user-select: none;
      letter-spacing: 0.03em;
    }

    /* ── Spec panel ──────────────────────────────────────────── */
    #spec-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 220px;
      background: rgba(244,241,232,0.96);
      border: 0.5px solid #c8b89a;
      border-radius: 6px;
      padding: 14px 16px 16px;
      pointer-events: none;
    }

    #spec-panel h3 {
      font-family: Georgia, serif;
      font-size: 12px;
      font-weight: normal;
      color: #546A80;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .spec-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .spec-key {
      font-family: Georgia, serif;
      font-size: 11px;
      font-style: italic;
      color: #9a8e80;
    }

    .spec-val {
      font-family: Georgia, serif;
      font-size: 11px;
      color: #2a2620;
    }

    /* ── Instructions ────────────────────────────────────────── */
    #instructions {
      position: fixed;
      bottom: 60px;
      right: 20px;
      width: 220px;
      background: rgba(244,241,232,0.96);
      border: 0.5px solid #c8b89a;
      border-radius: 6px;
      padding: 12px 16px 14px;
      pointer-events: none;
    }

    #instructions p {
      font-family: Georgia, serif;
      font-size: 11px;
      color: #7a6e60;
      line-height: 1.6;
      margin: 0;
    }

    #instructions .hint-key {
      color: #546A80;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="state-label">rest</div>

<div id="spec-panel">
  <h3>current state</h3>
  <div class="spec-row"><span class="spec-key">state</span><span class="spec-val" id="sp-state">rest</span></div>
  <div class="spec-row"><span class="spec-key">color</span><span class="spec-val" id="sp-color">#546A80</span></div>
  <div class="spec-row"><span class="spec-key">radius</span><span class="spec-val" id="sp-radius">5px</span></div>
  <div class="spec-row"><span class="spec-key">filled</span><span class="spec-val" id="sp-filled">yes</span></div>
  <div class="spec-row"><span class="spec-key">elongation</span><span class="spec-val" id="sp-elongation">1.0×</span></div>
  <div class="spec-row"><span class="spec-key">opacity</span><span class="spec-val" id="sp-opacity">1.0</span></div>
</div>

<div id="instructions">
  <p>
    <span class="hint-key">hover</span> near a point to approach<br>
    <span class="hint-key">click</span> a point for tap<br>
    <span class="hint-key">drag</span> from a point for circle<br>
    <span class="hint-key">F</span> force consequence-imminent state<br>
    <span class="hint-key">R</span> reset view
  </p>
</div>

<div id="state-label"></div>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════════
   CONSTANTS — matched to geometry-v1.html
   ════════════════════════════════════════════════════════════════ */

const COLORS = {
  background:  '#f4f1e8',
  paynesGray:  '#546A80',
  copper:      '#BE622F',
  line:        '#546A80',
  point:       '#BE622F',
};

// Thresholds in screen px (geometry tool uses logical units;
// at default viewScale ~0.9 these map to almost the same value)
const SNAP_DISTANCE  = 28;   // px — cursor starts acknowledging point
const HIT_RADIUS     = 18;   // px — click registers as hitting a point
const POINT_RADIUS   =  2;   // px — matched to geometry-v1 pointSize

// Cursor shape parameters
const CURSOR = {
  // Crosshair+circle form
  circleRadius:     9,      // px — inscribing circle radius
  circleWidth:      1.5,    // px — circle stroke width
  crossLen:         6,      // px — length of each crosshair arm (beyond gap)
  crossGap:         2,      // px — gap at center so point is visible
  crossWidth:       0.6,    // px — crosshair line width (thin)
  colorRest:        '#8a9aaa',  // lighter at rest — crosshairs darken on approach
  colorSnap:        '#1a2830',  // near-black at snap
  colorCircle:      '#1a2830',  // circle always this dark
  // Drag/tap ring form (crosshairs hidden during drag)
  dragRingOuter:    6,      // smaller than cursor circle — tap ring
  dragRingInner:    3,
  dragRingWidth:    0.75,   // thinner than drag ring
  dragRingOuter2:   9,      // full drag ring (grows to this)
  dragRingInner2:   4,
  dragElongMax:     1.6,
  // Mousedown dot — filled circle shown on mousedown, before drag begins
  mouseDownDotRadius: 3,    // px — filled circle radius on mousedown
  // Tap — small ring appears instantly, fades
  tapDuration:      300,    // ms fade duration
  // Consequence
  consequenceColor: '#BE622F',
};

/* ════════════════════════════════════════════════════════════════
   CANVAS SETUP
   ════════════════════════════════════════════════════════════════ */

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); draw(); });

/* ════════════════════════════════════════════════════════════════
   CONSTRUCTION POINTS
   A few seed + intersection points placed on screen.
   ════════════════════════════════════════════════════════════════ */

function makePts() {
  const cx = window.innerWidth  / 2;
  const cy = window.innerHeight / 2;
  const r  = 120;
  return [
    { x: cx,       y: cy,       label: '0' },
    { x: cx + r*2, y: cy,       label: '1' },
    { x: cx + r,   y: cy - r * Math.sqrt(3), label: '2' },
    { x: cx + r,   y: cy + r * Math.sqrt(3), label: '3' },
    { x: cx - r,   y: cy - r * Math.sqrt(3) * 0.6, label: '4' },
  ];
}

let pts = makePts();

/* ════════════════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════════════════ */

const mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };

// cursorState: 'rest' | 'approach' | 'snap' | 'tap' | 'drag-init' | 'drag' | 'drag-release' | 'consequence'
let cursorState    = 'rest';
let nearestPt      = null;   // point being approached/snapped
let nearestDist    = Infinity;

// drag tracking
let isDragging     = false;
let isErasing      = false;  // true when drag started from empty canvas
let dragFromPoint  = false;  // true when drag started from a snappable point
let dragOrigin     = null;   // { x, y } screen coords
let dragVec        = { x: 0, y: 0 };  // direction of drag
let dragDist       = 0;
let mouseIsDown    = false;  // true between mousedown and mouseup, regardless of drag

// eraser state
let fadedSegments  = new Set();  // indices of segments faded this session
let eraserAngle    = -0.45;      // radians, default ~25° — rotates to follow drag
let eraserTrail    = [];         // [{x,y,age}] recent positions for smear effect

// tap animation — drawn at the point, not at the cursor
let tapTime        = 0;
let tapActive      = false;
let tapPoint       = null;  // {x, y} screen coords of the tapped point

// drag-release animation
let releaseTime    = 0;
let releaseActive  = false;

// force-consequence key
let forceConsequence = false;

/* ════════════════════════════════════════════════════════════════
   CURSOR RENDERING
   ════════════════════════════════════════════════════════════════ */

function lerp(a, b, t) { return a + (b - a) * Math.min(1, Math.max(0, t)); }

function drawCrosshairCursor(color, opacity) {
  // Draws circle + crosshair with gap at center
  const r   = CURSOR.circleRadius;
  const gap = CURSOR.crossGap;
  const len = CURSOR.crossLen;

  ctx.globalAlpha = opacity;

  // White halo on circle
  ctx.beginPath();
  ctx.arc(0, 0, r + 1.5, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = CURSOR.circleWidth + 2;
  ctx.stroke();

  // Circle — always dark regardless of approach state
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.strokeStyle = CURSOR.colorCircle;
  ctx.lineWidth = CURSOR.circleWidth;
  ctx.stroke();

  // Crosshair arms — four segments with gap at center
  ctx.strokeStyle = color;
  ctx.lineWidth = CURSOR.crossWidth;
  ctx.lineCap = 'round';

  // White halo on crosshairs
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = CURSOR.crossWidth + 2;
  [[gap, gap+len, 0, 0], [-gap, -(gap+len), 0, 0],
   [0, 0, gap, gap+len], [0, 0, -gap, -(gap+len)]].forEach(([x1,x2,y1,y2]) => {
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  });
  ctx.restore();

  // Crosshair arms
  ctx.strokeStyle = color;
  ctx.lineWidth = CURSOR.crossWidth;
  [[gap, gap+len, 0, 0], [-gap, -(gap+len), 0, 0],
   [0, 0, gap, gap+len], [0, 0, -gap, -(gap+len)]].forEach(([x1,x2,y1,y2]) => {
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  });
}

function drawCursor(x, y) {
  const now = Date.now();
  ctx.save();
  ctx.translate(x, y);

  // ── Eraser (takes priority) ──────────────────────────────
  if (isDragging && isErasing) {
    ctx.rotate(eraserAngle);
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.roundRect(-10, -5.5, 20, 11, 2);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(-9, -4.5, 18, 9, 1.5);
    ctx.fillStyle = COLORS.paynesGray;
    ctx.fill();
    ctx.restore();
    return;
  }

  // Tap ring is now drawn separately at the point — not here.
  // Fall through to normal crosshair rendering.

  // Release is now instant — no transition, fall through to crosshair.

  // ── Mousedown / drag — dot expands into oval ───────────────
  if (mouseIsDown && !isErasing) {
    const DRAG_THRESHOLD = 6; // px before oval starts stretching
    if (dragDist < DRAG_THRESHOLD) {
      // Filled dot — stays until drag threshold crossed
      const r = CURSOR.mouseDownDotRadius;
      // White halo
      ctx.globalAlpha = 1.0;
      ctx.beginPath();
      ctx.arc(0, 0, r + 1.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fill();
      // Filled circle
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = CURSOR.colorCircle;
      ctx.fill();
    } else {
      // Oval stretches as drag grows
      const stretchDist = dragDist - DRAG_THRESHOLD;
      const elongT = Math.min(stretchDist / 80, 1.0);
      const elong  = lerp(1.0, CURSOR.dragElongMax, elongT);
      // Outer radius grows from dot size to full ring size
      const ro = lerp(CURSOR.mouseDownDotRadius, CURSOR.dragRingOuter2, Math.min(stretchDist / 30, 1.0));
      const ri = lerp(0, CURSOR.dragRingInner2, Math.min(stretchDist / 30, 1.0));
      const angle = Math.atan2(dragVec.y, dragVec.x);
      ctx.rotate(angle);
      ctx.scale(elong, 1.0 / Math.sqrt(elong));
      ctx.globalAlpha = 1.0;
      // White halo
      ctx.beginPath();
      ctx.arc(0, 0, ro + 1.5, 0, Math.PI * 2);
      if (ri > 1.5) {
        ctx.arc(0, 0, ri - 1.5, 0, Math.PI * 2, true);
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fill('evenodd');
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fill();
      }
      // Oval (ring with growing hole)
      ctx.beginPath();
      ctx.arc(0, 0, ro, 0, Math.PI * 2);
      if (ri > 0.5) {
        ctx.arc(0, 0, ri, 0, Math.PI * 2, true);
        ctx.fillStyle = CURSOR.colorCircle;
        ctx.fill('evenodd');
      } else {
        ctx.fillStyle = CURSOR.colorCircle;
        ctx.fill();
      }
    }
    ctx.restore();
    return;
  }

  // ── Consequence imminent — crosshair+circle in copper, pulsing ──
  if (forceConsequence) {
    const pulse = 0.75 + 0.25 * Math.sin(now / 180);
    drawCrosshairCursor(CURSOR.consequenceColor, pulse);
    ctx.restore();
    return;
  }

  // ── Rest / approach / snap — darken as cursor approaches point ──
  let cursorColor;
  if (cursorState === 'snap') {
    cursorColor = CURSOR.colorSnap;
  } else if (cursorState === 'approach') {
    const t = 1.0 - (nearestDist - HIT_RADIUS) / (SNAP_DISTANCE - HIT_RADIUS);
    cursorColor = lerp_color(CURSOR.colorRest, CURSOR.colorSnap, Math.max(0, t));
  } else {
    cursorColor = CURSOR.colorRest;
  }
  drawCrosshairCursor(cursorColor, 1.0);
  ctx.restore();
}

// Lerp between two hex colors
function lerp_color(hex1, hex2, t) {
  const r1 = parseInt(hex1.slice(1,3),16), g1 = parseInt(hex1.slice(3,5),16), b1 = parseInt(hex1.slice(5,7),16);
  const r2 = parseInt(hex2.slice(1,3),16), g2 = parseInt(hex2.slice(3,5),16), b2 = parseInt(hex2.slice(5,7),16);
  const r = Math.round(lerp(r1, r2, t)).toString(16).padStart(2,'0');
  const g = Math.round(lerp(g1, g2, t)).toString(16).padStart(2,'0');
  const b = Math.round(lerp(b1, b2, t)).toString(16).padStart(2,'0');
  return '#' + r + g + b;
}

/* ════════════════════════════════════════════════════════════════
   CONSTRUCTION POINT RENDERING
   ════════════════════════════════════════════════════════════════ */

function drawPoints() {
  pts.forEach(pt => {
    const isNear = nearestPt === pt;

    // White halo so point is visible against any background
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, POINT_RADIUS + 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fill();

    // Point itself
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, POINT_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.point;
    ctx.fill();
  });
}

/* ════════════════════════════════════════════════════════════════
   SEGMENTS — defined once, referenced by eraser hit detection
   ════════════════════════════════════════════════════════════════ */

// Rebuilt each frame from current pts positions
let SEGMENTS = [];

function buildSegments() {
  SEGMENTS = [
    { x1: pts[0].x, y1: pts[0].y, x2: pts[1].x, y2: pts[1].y },
    { x1: pts[0].x, y1: pts[0].y, x2: pts[2].x, y2: pts[2].y },
    { x1: pts[0].x, y1: pts[0].y, x2: pts[3].x, y2: pts[3].y },
    { x1: pts[1].x, y1: pts[1].y, x2: pts[2].x, y2: pts[2].y },
    { x1: pts[2].x, y1: pts[2].y, x2: pts[4].x, y2: pts[4].y },
    { x1: pts[3].x, y1: pts[3].y, x2: pts[4].x, y2: pts[4].y },
  ];
}

/* ════════════════════════════════════════════════════════════════
   LINES
   ════════════════════════════════════════════════════════════════ */

function drawLines() {
  buildSegments();
  ctx.save();
  ctx.lineWidth = 0.5;
  SEGMENTS.forEach((seg, i) => {
    const faded = fadedSegments.has(i);
    ctx.strokeStyle = '#546A80';
    ctx.globalAlpha = faded ? 0.12 : 0.6;
    ctx.beginPath();
    ctx.moveTo(seg.x1, seg.y1);
    ctx.lineTo(seg.x2, seg.y2);
    ctx.stroke();
  });
  ctx.restore();
}

/* ════════════════════════════════════════════════════════════════
   DRAG ARC (ghost circle while dragging from a point)
   ════════════════════════════════════════════════════════════════ */

function drawDragArc() {
  if (!isDragging || !dragOrigin || isErasing) return;
  const r = Math.sqrt(
    (mouse.x - dragOrigin.x) ** 2 +
    (mouse.y - dragOrigin.y) ** 2
  );
  if (r < 4) return;
  ctx.save();
  ctx.beginPath();
  ctx.arc(dragOrigin.x, dragOrigin.y, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#546A80';
  ctx.lineWidth   = 0.5;
  ctx.globalAlpha = 0.5;
  ctx.stroke();
  ctx.restore();
}

/* ════════════════════════════════════════════════════════════════
   MAIN DRAW
   ════════════════════════════════════════════════════════════════ */

function drawTapRing() {
  if (!tapActive || !tapPoint) return;
  const now = Date.now();
  const elapsed = now - tapTime;
  const t = elapsed / CURSOR.tapDuration;
  if (t >= 1) { tapActive = false; return; }
  const ro = CURSOR.dragRingOuter, ri = CURSOR.dragRingInner;
  ctx.save();
  ctx.translate(tapPoint.x, tapPoint.y);
  ctx.globalAlpha = lerp(1.0, 0.0, t);
  // White halo
  ctx.beginPath();
  ctx.arc(0, 0, ro + 1.5, 0, Math.PI * 2);
  ctx.arc(0, 0, Math.max(0, ri - 1.5), 0, Math.PI * 2, true);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fill('evenodd');
  // Ring
  ctx.beginPath();
  ctx.arc(0, 0, ro, 0, Math.PI * 2);
  ctx.arc(0, 0, ri, 0, Math.PI * 2, true);
  ctx.fillStyle = CURSOR.colorCircle;
  ctx.fill('evenodd');
  ctx.restore();
}

function draw() {
  const W = window.innerWidth, H = window.innerHeight;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = COLORS.background;
  ctx.fillRect(0, 0, W, H);

  drawLines();
  drawDragArc();
  drawPoints();
  drawTapRing();   // drawn at the point, independent of cursor
  drawCursor(mouse.x, mouse.y);

  updateStateLabel();
  updateSpecPanel();
}

function loop() {
  draw();
  requestAnimationFrame(loop);
}

/* ════════════════════════════════════════════════════════════════
   STATE UPDATE
   ════════════════════════════════════════════════════════════════ */

// Minimum distance between two line segments (eraser path vs construction segment)
function segToSegDist(ax, ay, bx, by, cx, cy, dx, dy) {
  // Test all four point-to-segment distances and take the minimum.
  // This handles crossing segments correctly.
  return Math.min(
    pointToSegDist(ax, ay, cx, cy, dx, dy),
    pointToSegDist(bx, by, cx, cy, dx, dy),
    pointToSegDist(cx, cy, ax, ay, bx, by),
    pointToSegDist(dx, dy, ax, ay, bx, by)
  );
}

function pointToSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx*dx + dy*dy;
  if (lenSq === 0) return Math.sqrt((px-ax)**2 + (py-ay)**2);
  const t = Math.max(0, Math.min(1, ((px-ax)*dx + (py-ay)*dy) / lenSq));
  return Math.sqrt((px - (ax + t*dx))**2 + (py - (ay + t*dy))**2);
}

function checkEraserHits() {
  if (eraserTrail.length < 2) return;
  const a = eraserTrail[eraserTrail.length - 2];
  const b = eraserTrail[eraserTrail.length - 1];
  SEGMENTS.forEach((seg, i) => {
    if (fadedSegments.has(i)) return;
    // Test minimum distance between eraser path segment and construction segment
    const d = segToSegDist(a.x, a.y, b.x, b.y, seg.x1, seg.y1, seg.x2, seg.y2);
    if (d < 14) fadedSegments.add(i);
  });
}

function updateCursorState() {
  if (forceConsequence) { cursorState = 'consequence'; return; }
  if (isDragging && isErasing) { cursorState = dragDist < 4 ? 'drag-init' : 'erase'; return; }
  if (isDragging)       { cursorState = dragDist < 4 ? 'drag-init' : 'drag'; return; }
  if (tapActive)        { cursorState = 'tap'; return; }
  if (releaseActive)    { cursorState = 'drag-release'; return; }

  // Find nearest point
  nearestDist = Infinity;
  nearestPt   = null;
  pts.forEach(pt => {
    const d = Math.sqrt((mouse.x - pt.x)**2 + (mouse.y - pt.y)**2);
    if (d < nearestDist) { nearestDist = d; nearestPt = pt; }
  });

  if (nearestDist <= HIT_RADIUS)     cursorState = 'snap';
  else if (nearestDist <= SNAP_DISTANCE) cursorState = 'approach';
  else                               cursorState = 'rest';
}

function updateStateLabel() {
  const labelMap = {
    'rest':         'rest',
    'approach':     'approaching',
    'snap':         'snap',
    'tap':          'tap',
    'drag-init':    isErasing ? 'erase — initiation' : 'drag — initiation',
    'drag':         'drag — in motion',
    'erase':        'erase — brush',
    'drag-release': 'drag — release',
    'consequence':  'consequence imminent',
  };
  document.getElementById('state-label').textContent = labelMap[cursorState] || cursorState;
}

function updateSpecPanel() {
  const stateMap = {
    'rest':         { color: CURSOR.restColor,         radius: CURSOR.restRadius, filled: 'yes', elong: '1.0×', opacity: '1.0' },
    'approach':     { color: CURSOR.approachColor,     radius: CURSOR.restRadius, filled: 'yes', elong: '1.0×', opacity: '1.0' },
    'snap':         { color: CURSOR.snapColor,         radius: CURSOR.snapRadius, filled: 'yes', elong: '1.0×', opacity: '1.0' },
    'tap':          { color: CURSOR.snapColor,         radius: '5→11→4px',        filled: 'yes', elong: '1.0×', opacity: '1→0' },
    'drag-init':    { color: CURSOR.snapColor,         radius: CURSOR.dragRingOuter, filled: 'ring', elong: '1.0×', opacity: '1.0' },
    'drag':         { color: CURSOR.snapColor,         radius: CURSOR.dragRingOuter, filled: 'ring', elong: 'up to 1.6×', opacity: '1.0' },
    'drag-release': { color: CURSOR.restColor,         radius: CURSOR.restRadius, filled: 'yes', elong: '1.0×', opacity: '1.0' },
    'consequence':  { color: CURSOR.consequenceColor,  radius: CURSOR.restRadius, filled: 'yes', elong: '1.0×', opacity: '0.75–1.0' },
  };

  const s = stateMap[cursorState] || stateMap['rest'];
  document.getElementById('sp-state').textContent    = cursorState;
  document.getElementById('sp-color').textContent    = s.color;
  document.getElementById('sp-radius').textContent   = typeof s.radius === 'number' ? s.radius + 'px' : s.radius;
  document.getElementById('sp-filled').textContent   = s.filled;
  document.getElementById('sp-elongation').textContent = s.elong;
  document.getElementById('sp-opacity').textContent  = s.opacity;
}

/* ════════════════════════════════════════════════════════════════
   INPUT HANDLERS
   ════════════════════════════════════════════════════════════════ */

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;

  if (isDragging && dragOrigin) {
    const dx = mouse.x - dragOrigin.x;
    const dy = mouse.y - dragOrigin.y;
    dragDist = Math.sqrt(dx*dx + dy*dy);
    if (dragDist > 1.0) {
      dragVec    = { x: dx / dragDist, y: dy / dragDist };
      eraserAngle = Math.atan2(dy, dx) + Math.PI / 2;
    }

    if (isErasing && dragDist > 4) {
      // Record trail point
      eraserTrail.push({ x: mouse.x, y: mouse.y, age: Date.now() });
      // Trim trail to last 400ms
      const now = Date.now();
      eraserTrail = eraserTrail.filter(p => now - p.age < 400);
      // Check each line segment for intersection with eraser path
      checkEraserHits();
    }
  }

  updateCursorState();
});

canvas.addEventListener('mousedown', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouseIsDown = true;
  updateCursorState();

  if (cursorState === 'snap' || cursorState === 'approach') {
    // Drag from point → draw circle
    isDragging    = true;
    isErasing     = false;
    dragFromPoint = true;
    dragOrigin    = { x: nearestPt ? nearestPt.x : mouse.x, y: nearestPt ? nearestPt.y : mouse.y };
    dragVec       = { x: 0, y: 0 };
    dragDist      = 0;
  } else {
    // Drag from empty canvas → eraser
    isDragging    = true;
    isErasing     = true;
    dragFromPoint = false;
    dragOrigin    = { x: mouse.x, y: mouse.y };
    dragVec       = { x: 0, y: 0 };
    dragDist      = 0;
    eraserTrail   = [];
    fadedSegments.clear();
  }
});

canvas.addEventListener('mouseup', e => {
  mouseIsDown = false;
  if (isDragging) {
    if (isErasing) {
      // End of erase gesture
      isErasing     = false;
      eraserTrail   = [];
    } else if (dragFromPoint && dragDist < 6) {
      // Tap on point — ring fires at the point; cursor snaps back immediately
      tapActive = true;
      tapTime   = Date.now();
      tapPoint  = dragOrigin ? { x: dragOrigin.x, y: dragOrigin.y } : { x: mouse.x, y: mouse.y };
    }
    // All releases: snap instantly back to crosshair (no transition)
    releaseActive = false;
    isDragging  = false;
    dragOrigin  = null;
    dragDist    = 0;
    dragVec     = { x: 0, y: 0 };
  }
  updateCursorState();
});

// Force consequence-imminent state with F key
document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') {
    forceConsequence = true;
    updateCursorState();
  }
  if (e.key === 'r' || e.key === 'R') {
    pts = makePts();
    fadedSegments.clear();
    eraserTrail = [];
  }
});

document.addEventListener('keyup', e => {
  if (e.key === 'f' || e.key === 'F') {
    forceConsequence = false;
    updateCursorState();
  }
});

/* ════════════════════════════════════════════════════════════════
   START
   ════════════════════════════════════════════════════════════════ */

loop();

</script>
