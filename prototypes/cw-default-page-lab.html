<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curious Woods -- Geometry Workspace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; background: #f4f1e8; font-family: Georgia, serif; }

    #canvas {
      position: fixed; inset: 0; z-index: 0;
      touch-action: none; display: block;
    }

    #left-panel {
      width: 220px; min-width: 220px;
      position: fixed; top: 0; left: 0; bottom: 0;
      background: rgba(210,200,180,0.18);
      pointer-events: none;
      transition: width 400ms ease-in-out, min-width 400ms ease-in-out;
      overflow: visible; z-index: 10;
    }
    #left-panel::after {
      content: ''; position: absolute;
      top: 0; right: 0; bottom: 0; width: 0.5px;
      background: #c8b89a; pointer-events: none;
    }

    #model-layer {
      position: fixed; inset: 0; z-index: 590;
      pointer-events: none; display: none; overflow: hidden;
    }
    #model-layer img {
      position: absolute; cursor: move;
      pointer-events: all; user-select: none;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(1);
      max-width: none; transform-origin: center center;
    }

    /* --- Tools menu --- */
    #tools-root {
      position: fixed; top: 20px; left: 16px;
      z-index: 110; pointer-events: all;
      user-select: none; padding: 0 20px 16px 0;
    }
    #tools-word {
      color: #546A80; font-family: Georgia, serif;
      font-size: 14px; font-weight: normal; line-height: 1;
      cursor: default; display: block;
    }
    #tools-l2 {
      margin: 0; padding: 0; list-style: none;
      overflow: hidden; max-height: 0;
      transition: max-height 120ms ease-in;
    }
    #tools-l2.revealed { max-height: 500px; transition: max-height 150ms ease-out; }
    .l2-item { position: relative; margin-top: 10px; opacity: 0; transform: translateX(-8px); transition: opacity 150ms ease-out, transform 150ms ease-out; }
    #tools-l2.revealed .l2-item { opacity: 1; transform: translateX(0); }
    #tools-l2.revealed .l2-item:nth-child(1) { transition-delay: 0ms; }
    #tools-l2.revealed .l2-item:nth-child(2) { transition-delay: 20ms; }
    #tools-l2.revealed .l2-item:nth-child(3) { transition-delay: 40ms; }
    #tools-l2.revealed .l2-item:nth-child(4) { transition-delay: 60ms; }
    #tools-l2.revealed .l2-item:nth-child(5) { transition-delay: 80ms; }
    #tools-l2.revealed .l2-item:nth-child(6) { transition-delay: 100ms; }
    #tools-l2.revealed .l2-item:nth-child(7) { transition-delay: 120ms; }
    #tools-l2.revealed .l2-item:nth-child(8) { transition-delay: 140ms; }
    #tools-l2.revealed .l2-item:nth-child(9) { transition-delay: 160ms; }
    #tools-l2:not(.revealed) .l2-item { opacity: 0; transform: translateX(-8px); transition: opacity 120ms ease-in, transform 120ms ease-in; transition-delay: 0ms !important; }
    .l2-label {
      display: block; color: #546A80; font-family: Georgia, serif;
      font-size: 14px; font-weight: normal; line-height: 1;
      padding-left: 12px; cursor: default; transition: color 80ms ease;
    }
    .l2-label:hover { color: #3D3D3A; }
    .l2-label.toggle-active { color: #3D3D3A; font-style: italic; }
    .l3-list { margin: 0; padding: 0; list-style: none; overflow: hidden; max-height: 0; transition: max-height 120ms ease-in; }
    .l3-list.revealed { max-height: 200px; transition: max-height 150ms ease-out; }
    .l3-item { margin-top: 8px; opacity: 0; transform: translateX(-8px); transition: opacity 150ms ease-out, transform 150ms ease-out; }
    .l3-list.revealed .l3-item { opacity: 1; transform: translateX(0); }
    .l3-list.revealed .l3-item:nth-child(1) { transition-delay: 0ms; }
    .l3-list.revealed .l3-item:nth-child(2) { transition-delay: 20ms; }
    .l3-list.revealed .l3-item:nth-child(3) { transition-delay: 40ms; }
    .l3-list:not(.revealed) .l3-item { opacity: 0; transform: translateX(-8px); transition: opacity 120ms ease-in, transform 120ms ease-in; transition-delay: 0ms !important; }
    .l3-label {
      display: block; color: #546A80; font-family: Georgia, serif;
      font-size: 13px; font-weight: normal; line-height: 1;
      padding-left: 24px; cursor: default; transition: color 80ms ease;
    }
    .l3-label:hover { color: #3D3D3A; }

    /* --- Remember --- */
    #remember {
      position: fixed; left: 16px; top: 50%;
      transform: translateY(-50%);
      line-height: 1.55; z-index: 100;
      cursor: grab; pointer-events: all; user-select: none;
      transition: top 400ms ease-in-out;
    }
    #remember.dragging { transition: none; cursor: grabbing; }
    .remember-plain { font-family: Georgia, serif; font-size: 16px; color: #2a2620; display: block; }
    .remember-word  { font-family: Georgia, serif; font-size: 19px; color: #b87333; display: block; }

    /* --- Panel tools --- */
    .panel-tool {
      position: fixed; left: 16px; z-index: 100;
      pointer-events: all; width: 188px;
      opacity: 0; transition: opacity 200ms ease-in, top 400ms ease-in-out;
    }
    .panel-tool.visible { opacity: 1; }
    .panel-tool-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px; cursor: grab;
    }
    .panel-tool-header:active { cursor: grabbing; }
    .panel-tool-title { font-family: Georgia, serif; font-size: 14px; color: #546A80; font-weight: normal; line-height: 1; }
    .panel-tool-close { font-family: Georgia, serif; font-size: 11px; color: #b0a090; cursor: default; transition: color 80ms; line-height: 1; }
    .panel-tool-close:hover { color: #546A80; }

    /* --- Slider --- */
    .cw-slider-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .cw-slider-label { font-family: Georgia, serif; font-size: 10px; color: #9a8e80; width: 46px; flex-shrink: 0; }
    input[type=range].cw-slider { flex: 1; height: 3px; appearance: none; background: #c8b89a; border-radius: 2px; outline: none; cursor: pointer; }
    input[type=range].cw-slider::-webkit-slider-thumb { appearance: none; width: 10px; height: 15px; background: #546A80; border-radius: 2px; cursor: pointer; }

    /* --- Palette tool --- */
    #tool-palette .palette-name { font-family: Georgia, serif; font-size: 14px; color: #546A80; cursor: default; user-select: none; line-height: 1; transition: color 80ms; }
    #tool-palette .palette-name:hover { color: #3D3D3A; }
    #palette-switcher { margin-bottom: 10px; }
    .palette-switch-item { display: block; font-family: Georgia, serif; font-size: 13px; color: #546A80; padding: 5px 0 0 10px; cursor: default; transition: color 80ms; user-select: none; }
    .palette-switch-item:hover { color: #3D3D3A; }
    .palette-switch-item.current { color: #3D3D3A; }
    .palette-switch-item.choose { color: #9a8e80; font-style: italic; }
    .palette-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; }
    .palette-grid.wide { grid-template-columns: repeat(4,1fr); }
    .palette-swatch { height: 28px; border-radius: 3px; cursor: pointer; border: 1.5px solid transparent; transition: border-color 100ms; }
    .palette-swatch:hover { border-color: rgba(84,106,128,0.4); }
    .palette-swatch.selected { border-color: #546A80; }
    .palette-swatch.swatch-lead { background: #f0ede4 !important; border: 1.5px solid #4a4540 !important; }
    .lead-active .palette-swatch:not(.swatch-lead) { box-shadow: inset 0 0 0 2px #4a4540; }
    .craft-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin-top: 8px; padding-top: 8px; border-top: 0.5px solid #d8ceba; }
    .craft-swatch-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .craft-swatch-label { font-family: Georgia, serif; font-style: italic; font-size: 10px; color: #7a6e60; line-height: 1; }
    .palette-recipe { font-family: Georgia, serif; font-style: italic; font-size: 11px; color: rgba(42,38,32,0.7); margin-top: 8px; min-height: 14px; line-height: 1.3; }

    /* --- Model tool --- */
    #tool-model .model-hint { font-family: Georgia, serif; font-size: 11px; font-style: italic; color: #9a8e80; display: block; margin-bottom: 10px; }

    /* --- Workspace pinned tools --- */
    .workspace-tool { position: fixed; z-index: 500; background: rgba(244,241,232,0.96); border: 0.5px solid #c8b89a; border-radius: 6px; padding: 12px 14px 14px; pointer-events: all; box-shadow: 0 2px 12px rgba(42,38,32,0.08); min-width: 188px; }
    .workspace-tool-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; cursor: grab; }
    .workspace-tool-header:active { cursor: grabbing; }
    .workspace-tool-title { font-family: Georgia, serif; font-size: 14px; color: #546A80; }
    .workspace-tool-close { font-family: Georgia, serif; font-size: 11px; color: #b0a090; cursor: default; transition: color 80ms; }
    .workspace-tool-close:hover { color: #546A80; }

    /* --- Picker --- */
    #picker-backdrop { position: fixed; inset: 0; z-index: 600; display: none; }
    #picker-backdrop.visible { display: block; }
    #picker-window { position: fixed; z-index: 601; background: #f0ede4; border: 0.5px solid #c8b89a; border-radius: 8px; padding: 18px; box-shadow: 0 4px 24px rgba(42,38,32,0.18); opacity: 0; transition: opacity 200ms ease-in; pointer-events: none; max-height: 85vh; overflow-y: auto; }
    #picker-window.visible { opacity: 1; pointer-events: all; }
    #picker-drag-handle { height: 14px; margin: -18px -18px 0 -18px; border-radius: 8px 8px 0 0; cursor: grab; background: rgba(200,184,154,0.25); display: flex; align-items: center; justify-content: flex-end; padding: 0 10px; }
    #picker-drag-handle:active { cursor: grabbing; }
    #picker-close-btn { font-family: Georgia, serif; font-size: 11px; color: #b0a090; cursor: default; transition: color 80ms; pointer-events: all; line-height: 14px; }
    #picker-close-btn:hover { color: #546A80; }
    .picker-grid { display: grid; grid-template-columns: repeat(3,200px); gap: 20px; margin-top: 14px; }
    .picker-item { display: flex; flex-direction: column; align-items: center; cursor: default; }
    .picker-thumb { width: 200px; height: 200px; border-radius: 5px; border: 1.5px solid transparent; overflow: hidden; display: flex; align-items: center; justify-content: center; background: rgba(244,241,232,0.6); transition: border-color 100ms; }
    .picker-thumb:hover { border-color: rgba(84,106,128,0.4); }
    .picker-thumb.selected { border-color: #546A80; }
    .picker-item-name { font-family: Georgia, serif; font-size: 12px; color: #7a6e60; margin-top: 6px; text-align: center; line-height: 1.3; width: 200px; }

    /* --- Drag hint --- */
    #drag-hint { position: fixed; left: 16px; font: 9px/1 system-ui; color: #b0a090; pointer-events: none; z-index: 99; transition: opacity 1s ease-in; }
    #drag-hint.faded { opacity: 0; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="left-panel"></div>
<div id="model-layer"><img id="model-img" src="" alt="" draggable="false"></div>

<div id="tools-root">
  <span id="tools-word">Tools</span>
  <ul id="tools-l2">
    <li class="l2-item" data-tool="save">
      <span class="l2-label">Save</span>
      <ul class="l3-list">
        <li class="l3-item"><span class="l3-label" data-action="save-construction">As Construction</span></li>
        <li class="l3-item"><span class="l3-label" data-action="save-image">As Image</span></li>
      </ul>
    </li>
    <li class="l2-item" data-tool="load"><span class="l2-label" data-action="load">Load</span></li>
    <li class="l2-item" data-tool="new"><span class="l2-label" data-action="new">New</span></li>
    <li class="l2-item" data-tool="labels"><span class="l2-label" data-action="labels">Labels</span></li>
    <li class="l2-item" data-tool="lines"><span class="l2-label" id="lines-label" data-action="toggle-lines">Lines</span></li>
    <li class="l2-item" data-tool="color"><span class="l2-label" data-action="open-color">Color</span></li>
    <li class="l2-item" data-tool="model"><span class="l2-label" data-action="open-drawing-guide">Drawing Guide</span></li>
    <li class="l2-item" data-tool="glass"><span class="l2-label" id="glass-label" data-action="toggle-glass">Glass</span></li>
    <li class="l2-item" data-tool="share"><span class="l2-label" data-action="share">Share</span></li>
  </ul>
</div>

<div id="remember">
  <span class="remember-plain">I want to</span>
  <span class="remember-word">Remember</span>
  <span class="remember-plain">this</span>
</div>
<div id="drag-hint">drag to position</div>

<div id="tool-palette" class="panel-tool" style="display:none;">
  <div class="panel-tool-header" id="palette-drag-handle">
    <span class="panel-tool-title palette-name" id="palette-name-btn">Chartres</span>
    <span class="panel-tool-close" id="palette-close">close</span>
  </div>
  <div id="palette-switcher" style="display:none;"></div>
  <div class="palette-grid" id="palette-grid"></div>
  <div class="craft-row" id="craft-row"></div>
  <div class="palette-recipe" id="palette-recipe">&nbsp;</div>
</div>

<div id="tool-model" class="panel-tool" style="display:none;">
  <div class="panel-tool-header" id="model-drag-handle">
    <span class="panel-tool-title" id="model-name-btn" style="cursor:default;">Nested Squares</span>
    <span class="panel-tool-close" id="model-close">close</span>
  </div>
  <span class="model-hint">click and drag to reposition</span>
  <div class="cw-slider-row">
    <span class="cw-slider-label">scale</span>
    <input type="range" id="model-scale" class="cw-slider" min="10" max="400" value="100" step="1">
  </div>
  <div class="cw-slider-row">
    <span class="cw-slider-label">opacity</span>
    <input type="range" id="model-opacity" class="cw-slider" min="5" max="100" value="35" step="1">
  </div>
</div>

<div id="picker-backdrop"></div>
<div id="picker-window">
  <div id="picker-drag-handle"><span id="picker-close-btn">close</span></div>
  <div class="picker-grid" id="picker-grid"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
'use strict';

// ============================================================
// CONSTRUCTION ENGINE CONSTANTS
// ============================================================

var COLORS     = { background:'#f4f1e8', border:'#546A80', active:'#2c5aa0', point:'#BE622F' };
var THRESHOLDS = { tapMovement:8, doubleClickTime:300, snapDistance:15, pointHitRadius:12, lineHitRadius:14, circleHitRadius:8 };
var PARAMS     = { pointSize:3.5, birthScale:3.0, birthDuration:400, lineWidth:0.5, circleWidth:0.5, emphasisWidth:2.0, scaffoldOpacity:0.22 };

var FOREST_GLASS = '#c2d4bc';
var LEAD_COLOR   = '#4a4540';
var LEAD_WIDTH   = 3;

// Render toggles (were on old MENU object)
var showLines = true;
var showGlass = false;

// ============================================================
// AUDIO
// ============================================================

var audioCtx = null, audioUnlocked = false;
function unlockAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') audioCtx.resume();
    if (!audioUnlocked) {
        var b = audioCtx.createBuffer(1,1,22050), s = audioCtx.createBufferSource();
        s.buffer = b; s.connect(audioCtx.destination); s.start(0); audioUnlocked = true;
    }
}
function playSound(type) {
    if (!audioCtx || audioCtx.state !== 'running') return;
    var ac = audioCtx, gain = ac.createGain(); gain.connect(ac.destination);
    var t = ac.currentTime + 0.01;
    function osc(f,e) { var o = ac.createOscillator(); o.connect(gain); o.frequency.value = f; o.start(t); o.stop(t+e); }
    switch(type) {
        case 'point':    gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(0.15,t+0.005);gain.gain.exponentialRampToValueAtTime(0.001,t+0.2);osc(700,0.2);break;
        case 'line':     gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(0.15,t+0.005);gain.gain.exponentialRampToValueAtTime(0.001,t+0.3);osc(440,0.3);break;
        case 'circle':   gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(0.12,t+0.01);gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);osc(480,0.4);osc(720,0.4);break;
        case 'snap':     gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(0.1,t+0.002);gain.gain.exponentialRampToValueAtTime(0.001,t+0.08);osc(900,0.08);break;
        case 'emphasis_on':  { var o=ac.createOscillator();o.connect(gain);o.frequency.setValueAtTime(600,t);o.frequency.linearRampToValueAtTime(800,t+0.1);gain.gain.setValueAtTime(0.1,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.start(t);o.stop(t+0.1);break; }
        case 'emphasis_off': { var o=ac.createOscillator();o.connect(gain);o.frequency.setValueAtTime(800,t);o.frequency.linearRampToValueAtTime(600,t+0.1);gain.gain.setValueAtTime(0.1,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.start(t);o.stop(t+0.1);break; }
        case 'scaffold_fade':    { var o=ac.createOscillator();o.connect(gain);o.frequency.setValueAtTime(500,t);o.frequency.linearRampToValueAtTime(350,t+0.15);gain.gain.setValueAtTime(0.1,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.15);break; }
        case 'scaffold_restore': { var o=ac.createOscillator();o.connect(gain);o.frequency.setValueAtTime(350,t);o.frequency.linearRampToValueAtTime(500,t+0.15);gain.gain.setValueAtTime(0.1,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.15);break; }
        case 'fill':    gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(0.1,t+0.05);gain.gain.exponentialRampToValueAtTime(0.001,t+0.6);osc(330,0.6);osc(495,0.6);break;
        case 'repaint': gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(0.08,t+0.03);gain.gain.exponentialRampToValueAtTime(0.001,t+0.3);osc(440,0.3);osc(550,0.3);break;
    }
}

// ============================================================
// OPERATION LOG + DATA STRUCTURES
// ============================================================

var operationLog = [];

var points = new Map(), lines = new Map(), circles = new Map();
var logicalSegments = new Map(), logicalArcs = new Map();
var fills = new Map(), pointAnimations = new Map();

function initLog() {
    operationLog = [{ op:'init', seed0:{x:-100,y:0}, seed1:{x:100,y:0} }];
    replayLog(false);
}

function replayLog(animateNew) {
    var prev = new Map(pointAnimations);
    points.clear(); lines.clear(); circles.clear();
    logicalSegments.clear(); logicalArcs.clear(); fills.clear(); pointAnimations.clear();
    for (var i = 0; i < operationLog.length; i++) {
        var op = operationLog[i];
        if (op.op === 'init') {
            _addPt('seed:0', op.seed0.x, op.seed0.y, 'seed', prev, animateNew);
            _addPt('seed:1', op.seed1.x, op.seed1.y, 'seed', prev, animateNew);
        } else if (op.op === 'line') {
            var p1 = points.get(op.p1Id), p2 = points.get(op.p2Id); if (!p1||!p2) continue;
            var line = { logIdx:i, p1Id:op.p1Id, p2Id:op.p2Id, pointsOnLine:[op.p1Id,op.p2Id], isScaffold:false };
            lines.set(i, line);
            points.forEach(function(pt) { if (pt.id===op.p1Id||pt.id===op.p2Id) return; if (ptOnLine(pt.x,pt.y,p1,p2)) line.pointsOnLine.push(pt.id); });
            sortLine(line); updateSegs(line, i); detectLineX(i, prev, animateNew);
        } else if (op.op === 'circle') {
            var c = points.get(op.centerId), e = points.get(op.edgeId); if (!c||!e) continue;
            var radius = dist(c.x,c.y,e.x,e.y);
            var circ = { logIdx:i, centerId:op.centerId, edgeId:op.edgeId, radius:radius, pointsOnCircle:[op.edgeId], isScaffold:false };
            circles.set(i, circ);
            points.forEach(function(pt) { if (pt.id===op.centerId||pt.id===op.edgeId) return; if (ptOnCircle(pt.x,pt.y,c,radius)) circ.pointsOnCircle.push(pt.id); });
            sortCirc(circ); updateArcs(circ, i); detectCircX(i, prev, animateNew);
        } else if (op.op === 'emphasize') {
            var s = logicalSegments.get(op.key); if (s) s.isEmphasized = true;
            var a = logicalArcs.get(op.key); if (a) a.isEmphasized = true;
        } else if (op.op === 'deemphasize') {
            var s = logicalSegments.get(op.key); if (s) s.isEmphasized = false;
            var a = logicalArcs.get(op.key); if (a) a.isEmphasized = false;
        } else if (op.op === 'fill') {
            fills.set(op.fillId, { fillId:op.fillId, vertices:op.vertices, edges:op.edges||null, color:op.color, opacity:(op.opacity !== undefined ? op.opacity : 1.0), dissolved:false });
        } else if (op.op === 'repaint_fill') {
            var f = fills.get(op.fillId); if (f) { f.color = op.color; f.opacity = (op.opacity !== undefined ? op.opacity : f.opacity); }
        } else if (op.op === 'dissolve_fill') {
            var f = fills.get(op.fillId); if (f) f.dissolved = true;
        } else if (op.op === 'scaffold') {
            if (op.target === 'line') { var l = lines.get(op.idx); if (l) l.isScaffold = op.value; }
            else { var cir = circles.get(op.idx); if (cir) cir.isScaffold = op.value; }
        }
    }
}

function _addPt(id, x, y, type, prev, animateNew) {
    points.set(id, { id:id, x:x, y:y, type:type });
    if (prev.has(id)) pointAnimations.set(id, prev.get(id));
    else if (animateNew) pointAnimations.set(id, { startTime:Date.now(), duration:PARAMS.birthDuration });
}

function detectLineX(lineI, prev, an) {
    var line = lines.get(lineI), p1 = points.get(line.p1Id), p2 = points.get(line.p2Id);
    lines.forEach(function(o, j) {
        if (j >= lineI) return;
        var q1 = points.get(o.p1Id), q2 = points.get(o.p2Id), pt = llX(p1,p2,q1,q2);
        if (pt) regX('ll:'+Math.min(lineI,j)+':'+Math.max(lineI,j), pt, prev, an);
    });
    circles.forEach(function(c, j) {
        var ce = points.get(c.centerId);
        lcX(p1,p2,ce,c.radius).forEach(function(pt,k) { regX('lc:'+lineI+':'+j+':'+k, pt, prev, an); });
    });
}

function detectCircX(circI, prev, an) {
    var circ = circles.get(circI), ce = points.get(circ.centerId);
    lines.forEach(function(l, j) {
        var p1 = points.get(l.p1Id), p2 = points.get(l.p2Id);
        lcX(p1,p2,ce,circ.radius).forEach(function(pt,k) { regX('lc:'+j+':'+circI+':'+k, pt, prev, an); });
    });
    circles.forEach(function(o, j) {
        if (j >= circI) return;
        var oc = points.get(o.centerId);
        ccX(ce,circ.radius,oc,o.radius).forEach(function(pt,k) { regX('cc:'+Math.min(circI,j)+':'+Math.max(circI,j)+':'+k, pt, prev, an); });
    });
}

function regX(id, pt, prev, an) {
    if (points.has(id)) return;
    var dup = false;
    points.forEach(function(ex) { if (dist(pt.x,pt.y,ex.x,ex.y) < 5) dup = true; });
    if (dup) return;
    _addPt(id, pt.x, pt.y, 'intersection', prev, an);
    var np = points.get(id);
    lines.forEach(function(l) {
        var lp1 = points.get(l.p1Id), lp2 = points.get(l.p2Id);
        if (!l.pointsOnLine.includes(id) && ptOnLine(np.x,np.y,lp1,lp2)) { l.pointsOnLine.push(id); sortLine(l); updateSegs(l,l.logIdx); }
    });
    circles.forEach(function(cir) {
        var ce = points.get(cir.centerId);
        if (id === cir.centerId) return;
        if (!cir.pointsOnCircle.includes(id) && ptOnCircle(np.x,np.y,ce,cir.radius)) { cir.pointsOnCircle.push(id); sortCirc(cir); updateArcs(cir,cir.logIdx); }
    });
}

function appendOp(op) { operationLog.push(op); replayLog(true); }
function undoOp() { if (operationLog.length <= 1) return; operationLog.pop(); replayLog(false); }
function newConstruction() { operationLog = [{ op:'init', seed0:{x:-100,y:0}, seed1:{x:100,y:0} }]; replayLog(false); }

function saveConstruction() {
    var name = prompt('Name this construction:', 'my construction'); if (name === null) return;
    var fn = (name.trim() || 'construction').replace(/[^a-z0-9 _-]/gi,'_');
    var blob = new Blob([JSON.stringify({ version:1, name:name.trim()||'construction', created:new Date().toISOString(), operations:operationLog }, null, 2)], { type:'application/json' });
    var url = URL.createObjectURL(blob), a = document.createElement('a'); a.href = url; a.download = fn+'.json'; a.click(); URL.revokeObjectURL(url);
}
function loadConstruction() { alert('To load: drag a construction .json file onto the canvas.'); }
function _loadFromFile(file) {
    var r = new FileReader();
    r.onload = function(ev) { try { var d = JSON.parse(ev.target.result); if (d.version===1 && Array.isArray(d.operations)) { operationLog = d.operations; replayLog(false); } } catch(e) { console.error(e); } };
    r.readAsText(file);
}
document.addEventListener('keydown', function(e) {
    if ((e.metaKey||e.ctrlKey) && e.key==='s') { e.preventDefault(); saveConstruction(); }
    if ((e.metaKey||e.ctrlKey) && e.key==='o') { e.preventDefault(); loadConstruction(); }
});

// ============================================================
// GEOMETRY HELPERS
// ============================================================

function dist(x1,y1,x2,y2) { return Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1)); }
function ptOnLine(px,py,p1,p2,tol) { tol=tol||0.1; var dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy); return len>0 && Math.abs((dy*(px-p1.x)-dx*(py-p1.y))/len)<tol; }
function ptOnCircle(px,py,c,r,tol) { tol=tol||0.5; return Math.abs(dist(px,py,c.x,c.y)-r)<tol; }
function getAngle(px,py,c) { return Math.atan2(py-c.y,px-c.x); }
function normA(a) { return ((a%(2*Math.PI))+(2*Math.PI))%(2*Math.PI); }
function angleBetween(t,a,b) { return normA(t-a) <= normA(b-a); }
function llX(p1,p2,p3,p4) {
    var d=(p1.x-p2.x)*(p3.y-p4.y)-(p1.y-p2.y)*(p3.x-p4.x);
    if (Math.abs(d)<1e-10) return null;
    var tv=((p1.x-p3.x)*(p3.y-p4.y)-(p1.y-p3.y)*(p3.x-p4.x))/d;
    return { x:p1.x+tv*(p2.x-p1.x), y:p1.y+tv*(p2.y-p1.y) };
}
function lcX(p1,p2,c,r) {
    var dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy); if (!len) return [];
    var nx=dx/len,ny=dy/len,tv=(c.x-p1.x)*nx+(c.y-p1.y)*ny;
    var cx=p1.x+tv*nx,cy=p1.y+tv*ny,dSq=(c.x-cx)*(c.x-cx)+(c.y-cy)*(c.y-cy);
    if (dSq>r*r) return [];
    var off=Math.sqrt(Math.max(0,r*r-dSq));
    var pts = [{ x:cx-off*nx, y:cy-off*ny }];
    if (off>1e-6) pts.push({ x:cx+off*nx, y:cy+off*ny });
    return pts;
}
function ccX(c1,r1,c2,r2) {
    var d=dist(c1.x,c1.y,c2.x,c2.y);
    if (d>r1+r2||d<Math.abs(r1-r2)||d<1e-10) return [];
    var a=(r1*r1-r2*r2+d*d)/(2*d), h=Math.sqrt(Math.max(0,r1*r1-a*a));
    var px=c1.x+a*(c2.x-c1.x)/d, py=c1.y+a*(c2.y-c1.y)/d;
    if (h<1e-6) return [{ x:px, y:py }];
    return [{ x:px+h*(c2.y-c1.y)/d, y:py-h*(c2.x-c1.x)/d }, { x:px-h*(c2.y-c1.y)/d, y:py+h*(c2.x-c1.x)/d }];
}

function sortLine(line) {
    var p1=points.get(line.p1Id),p2=points.get(line.p2Id); if (!p1||!p2) return;
    var dx=p2.x-p1.x,dy=p2.y-p1.y;
    line.pointsOnLine.sort(function(a,b) {
        var pa=points.get(a),pb=points.get(b); if (!pa||!pb) return 0;
        return ((pa.x-p1.x)*dx+(pa.y-p1.y)*dy) - ((pb.x-p1.x)*dx+(pb.y-p1.y)*dy);
    });
}
function updateSegs(line, li) {
    logicalSegments.forEach(function(v,k) { if (v.lineIdx===li) logicalSegments.delete(k); });
    var em = emphMap(li);
    for (var i=0; i<line.pointsOnLine.length-1; i++) {
        var a=line.pointsOnLine[i],b=line.pointsOnLine[i+1],k=li+':'+a+':'+b;
        logicalSegments.set(k, { lineIdx:li, pointAId:a, pointBId:b, isEmphasized:!!em.get(k) });
    }
}
function sortCirc(circ) {
    var ce=points.get(circ.centerId); if (!ce) return;
    circ.pointsOnCircle.sort(function(a,b) {
        var pa=points.get(a),pb=points.get(b); if (!pa||!pb) return 0;
        return getAngle(pa.x,pa.y,ce)-getAngle(pb.x,pb.y,ce);
    });
}
function updateArcs(circ, ci) {
    logicalArcs.forEach(function(v,k) { if (v.circIdx===ci) logicalArcs.delete(k); });
    var pts=circ.pointsOnCircle; if (pts.length<2) return;
    var em=emphMap(ci);
    for (var i=0; i<pts.length; i++) {
        var a=pts[i],b=pts[(i+1)%pts.length],k=ci+':'+a+':'+b;
        logicalArcs.set(k, { circIdx:ci, pointAId:a, pointBId:b, isEmphasized:!!em.get(k) });
    }
}
function emphMap(idx) {
    var m = new Map();
    for (var i=0; i<operationLog.length; i++) {
        var op=operationLog[i];
        if (op.op==='emphasize'   && op.key.indexOf(idx+':')===0) m.set(op.key,true);
        if (op.op==='deemphasize' && op.key.indexOf(idx+':')===0) m.set(op.key,false);
    }
    return m;
}

// ============================================================
// ACTION LAYER
// ============================================================

function getActiveColor() { return state.palette.selected; }

function fillRegion(fillId, vertices, edges) {
    appendOp({ op:'fill', fillId:fillId, vertices:vertices, edges:edges, color:FOREST_GLASS, opacity:1.0 });
}
function recolorRegion(fillId, colorHex, opacity) {
    appendOp({ op:'repaint_fill', fillId:fillId, color:colorHex, opacity:(opacity !== undefined ? opacity : 1.0) });
}
function dissolveRegion(fillId) {
    appendOp({ op:'dissolve_fill', fillId:fillId });
}

// ============================================================
// FILL POLYGON + HIT TEST
// ============================================================

function expandFillToPolygon(fill) {
    if (fill.edges) {
        var poly = [];
        fill.edges.forEach(function(edge) {
            if (edge.type === 'seg') {
                var p = points.get(edge.a); if (p) poly.push({ x:p.x, y:p.y });
            } else {
                var ci = circles.get(edge.circIdx); if (!ci) return;
                var ce = points.get(ci.centerId); if (!ce) return;
                var r = ci.radius, aA = edge.angleA, sweep = edge.sweep;
                var n = Math.max(4, Math.ceil(Math.abs(sweep)*r/2));
                for (var i=0; i<n; i++) {
                    var tv = i/n, ang = aA + sweep*tv;
                    poly.push({ x:ce.x+Math.cos(ang)*r, y:ce.y+Math.sin(ang)*r });
                }
            }
        });
        return poly;
    }
    return fill.vertices.map(function(id) { return points.get(id); }).filter(Boolean);
}

function pip(px,py,v) {
    var inside=false;
    for (var i=0,j=v.length-1; i<v.length; j=i++) {
        var xi=v[i].x,yi=v[i].y,xj=v[j].x,yj=v[j].y;
        if (((yi>py)!==(yj>py)) && px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
    }
    return inside;
}

function hitFilledRegion(wx,wy) {
    var arr = [];
    fills.forEach(function(f) { if (!f.dissolved) arr.push(f); });
    arr.reverse();
    for (var i=0; i<arr.length; i++) {
        var v = expandFillToPolygon(arr[i]);
        if (v.length>=3 && pip(wx,wy,v)) return arr[i];
    }
    return null;
}

// ============================================================
// REGION DETECTION + FILL
// ============================================================

function findClosedRegionEdges() {
    var adj = new Map();
    function addEdge(a,b,edge) {
        if (!adj.has(a)) adj.set(a,[]);
        if (!adj.has(b)) adj.set(b,[]);
        adj.get(a).push({ nb:b, edge:edge });
        adj.get(b).push({ nb:a, edge:edge });
    }
    logicalSegments.forEach(function(seg) {
        if (!seg.isEmphasized) return;
        addEdge(seg.pointAId, seg.pointBId, { type:'seg', a:seg.pointAId, b:seg.pointBId });
    });
    logicalArcs.forEach(function(arc) {
        if (!arc.isEmphasized) return;
        var ci=circles.get(arc.circIdx), ce=points.get(ci&&ci.centerId);
        if (!ci||!ce) return;
        var pA=points.get(arc.pointAId),pB=points.get(arc.pointBId);
        if (!pA||!pB) return;
        var aA=getAngle(pA.x,pA.y,ce), aB=getAngle(pB.x,pB.y,ce), sweep=normA(aB-aA);
        addEdge(arc.pointAId, arc.pointBId, { type:'arc', a:arc.pointAId, b:arc.pointBId, circIdx:arc.circIdx, angleA:aA, angleB:aB, sweep:sweep });
    });
    if (adj.size < 2) return null;
    var ok = true;
    adj.forEach(function(nb) { if (nb.length!==2) ok=false; });
    if (!ok) return null;
    var start = adj.keys().next().value;
    var orderedEdges = [], prevPt = null, curPt = start;
    while (true) {
        var conns = adj.get(curPt);
        var nextConn = (conns[0].nb === prevPt) ? conns[1] : conns[0];
        var edge = nextConn.edge;
        var directedEdge = { type:edge.type, a:curPt, b:nextConn.nb, circIdx:edge.circIdx, angleA:edge.angleA, angleB:edge.angleB, sweep:edge.sweep };
        if (directedEdge.type==='arc' && edge.a!==curPt) {
            directedEdge.angleA = edge.angleB;
            directedEdge.sweep  = -edge.sweep;
        }
        orderedEdges.push(directedEdge);
        if (nextConn.nb === start) break;
        if (orderedEdges.length > adj.size) return null;
        prevPt = curPt; curPt = nextConn.nb;
    }
    return orderedEdges.length === adj.size ? orderedEdges : null;
}

function checkAndFill() {
    var edges = findClosedRegionEdges(); if (!edges) return;
    var fillId = 'fill:'+Date.now();
    var vertices = edges.map(function(e) { return e.a; });
    fillRegion(fillId, vertices, edges);
    logicalSegments.forEach(function(seg,k) { if (seg.isEmphasized) appendOp({ op:'deemphasize', key:k }); });
    logicalArcs.forEach(function(arc,k) { if (arc.isEmphasized) appendOp({ op:'deemphasize', key:k }); });
    playSound('fill');
}

function checkAndDissolve(segKey) {
    var seg = logicalSegments.get(segKey); if (!seg) return;
    fills.forEach(function(fill) {
        if (fill.dissolved) return;
        var v = fill.vertices;
        for (var i=0; i<v.length; i++) {
            var a=v[i],b=v[(i+1)%v.length];
            if ((a===seg.pointAId&&b===seg.pointBId)||(a===seg.pointBId&&b===seg.pointAId)) { dissolveRegion(fill.fillId); break; }
        }
    });
}

// ============================================================
// CANVAS + VIEW
// ============================================================

var viewX=0, viewY=0, viewScale=1;
var canvas = document.getElementById('canvas');
var ctx    = canvas.getContext('2d');

function resizeCanvas() {
    var dpr = window.devicePixelRatio || 1;
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function snap(v) { return Math.round(v)+0.5; }
function w2s(wx,wy) { return { x:(wx-viewX)*viewScale+canvas.clientWidth/2,  y:(wy-viewY)*viewScale+canvas.clientHeight/2 }; }
function s2w(sx,sy) { return { x:(sx-canvas.clientWidth/2)/viewScale+viewX,   y:(sy-canvas.clientHeight/2)/viewScale+viewY }; }

// ============================================================
// RENDER
// ============================================================

function ptScale(id) {
    var a = pointAnimations.get(id); if (!a) return 1;
    var elapsed = Date.now()-a.startTime;
    if (elapsed >= a.duration) { pointAnimations.delete(id); return 1; }
    var tt = elapsed/a.duration;
    return PARAMS.birthScale - (PARAMS.birthScale-1)*(1-Math.pow(1-tt,3));
}

function extLine(p1,p2) {
    var dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy); if (!len) return null;
    var nx=dx/len,ny=dy/len,tl=s2w(0,0),br=s2w(canvas.clientWidth,canvas.clientHeight);
    var m=Math.max(Math.abs(br.x-tl.x),Math.abs(br.y-tl.y));
    return { x1:p1.x-nx*m,y1:p1.y-ny*m, x2:p1.x+nx*m,y2:p1.y+ny*m };
}

function render() {
    ctx.fillStyle = COLORS.background;
    ctx.fillRect(0,0,canvas.clientWidth,canvas.clientHeight);

    // Fills
    fills.forEach(function(f) {
        if (f.dissolved) return;
        var poly = expandFillToPolygon(f);
        var v = poly.map(function(p) { return w2s(p.x,p.y); });
        if (v.length < 3) return;
        ctx.beginPath(); ctx.moveTo(v[0].x,v[0].y);
        for (var i=1; i<v.length; i++) ctx.lineTo(v[i].x,v[i].y);
        ctx.closePath();
        ctx.fillStyle = f.color; ctx.globalAlpha = f.opacity; ctx.fill('evenodd');
        if (state.palette.leadActive) {
            ctx.strokeStyle = LEAD_COLOR; ctx.lineWidth = LEAD_WIDTH;
            ctx.globalAlpha = f.opacity; ctx.stroke();
        }
        ctx.globalAlpha = 1;
    });

    // Construction lines
    if (showLines && !showGlass) {
        lines.forEach(function(l) {
            var p1=points.get(l.p1Id),p2=points.get(l.p2Id);
            var ext=extLine(p1,p2); if (!ext) return;
            var s1=w2s(ext.x1,ext.y1),s2=w2s(ext.x2,ext.y2);
            ctx.strokeStyle=COLORS.border; ctx.lineWidth=PARAMS.lineWidth;
            ctx.globalAlpha=l.isScaffold?PARAMS.scaffoldOpacity:1;
            ctx.beginPath(); ctx.moveTo(snap(s1.x),snap(s1.y)); ctx.lineTo(snap(s2.x),snap(s2.y)); ctx.stroke();
            ctx.globalAlpha=1;
        });
        circles.forEach(function(ci) {
            var ce=points.get(ci.centerId),sc=w2s(ce.x,ce.y),sr=ci.radius*viewScale;
            ctx.strokeStyle=COLORS.border; ctx.lineWidth=PARAMS.circleWidth;
            ctx.globalAlpha=ci.isScaffold?PARAMS.scaffoldOpacity:1;
            ctx.beginPath(); ctx.arc(sc.x,sc.y,sr,0,Math.PI*2); ctx.stroke();
            ctx.globalAlpha=1;
        });
    }

    // Emphasized segments + arcs
    logicalSegments.forEach(function(seg) {
        if (!seg.isEmphasized) return;
        var A=points.get(seg.pointAId),B=points.get(seg.pointBId);
        var s1=w2s(A.x,A.y),s2=w2s(B.x,B.y);
        ctx.strokeStyle=COLORS.border; ctx.lineWidth=PARAMS.emphasisWidth; ctx.globalAlpha=1;
        ctx.beginPath(); ctx.moveTo(snap(s1.x),snap(s1.y)); ctx.lineTo(snap(s2.x),snap(s2.y)); ctx.stroke();
    });
    logicalArcs.forEach(function(arc) {
        if (!arc.isEmphasized) return;
        var ci=circles.get(arc.circIdx),ce=points.get(ci.centerId);
        var sc=w2s(ce.x,ce.y),sr=ci.radius*viewScale;
        var pA=points.get(arc.pointAId),pB=points.get(arc.pointBId);
        var aA=getAngle(pA.x,pA.y,ce),aB=getAngle(pB.x,pB.y,ce);
        ctx.strokeStyle=COLORS.border; ctx.lineWidth=PARAMS.emphasisWidth; ctx.globalAlpha=1;
        ctx.beginPath(); ctx.arc(sc.x,sc.y,sr,aA,aB,false); ctx.stroke();
    });

    // Ghost previews
    if (ghostLineEnd && firstTapPoint) {
        var gw=s2w(ghostLineEnd.x,ghostLineEnd.y),ext=extLine(firstTapPoint,gw);
        if (ext) {
            var s1=w2s(ext.x1,ext.y1),s2=w2s(ext.x2,ext.y2);
            ctx.strokeStyle=COLORS.border; ctx.globalAlpha=0.4; ctx.lineWidth=PARAMS.lineWidth;
            ctx.beginPath(); ctx.moveTo(snap(s1.x),snap(s1.y)); ctx.lineTo(snap(s2.x),snap(s2.y)); ctx.stroke(); ctx.globalAlpha=1;
        }
    }
    if (ghostCircle) {
        var sc=w2s(ghostCircle.center.x,ghostCircle.center.y);
        ctx.strokeStyle=COLORS.border; ctx.globalAlpha=0.4; ctx.lineWidth=PARAMS.circleWidth;
        ctx.beginPath(); ctx.arc(sc.x,sc.y,ghostCircle.radius*viewScale,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
    }
    if (snapTarget) {
        var s=w2s(snapTarget.x,snapTarget.y),pulse=0.7+0.3*Math.sin(Date.now()/200);
        ctx.strokeStyle=COLORS.active; ctx.lineWidth=3; ctx.globalAlpha=pulse;
        ctx.beginPath(); ctx.arc(s.x,s.y,8,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
    }

    // Points
    points.forEach(function(pt) {
        var s=w2s(pt.x,pt.y),sc=ptScale(pt.id),sm=(pt.type==='seed'?1.4:1.0);
        var ap = false;
        if (ghostCircle && snapTarget && snapTarget.id===pt.id) ap=true;
        if (!ap && ghostLineEnd && firstTapPoint) {
            var gw2=s2w(ghostLineEnd.x,ghostLineEnd.y);
            if (dist(pt.x,pt.y,gw2.x,gw2.y) < THRESHOLDS.pointHitRadius/viewScale) ap=true;
        }
        var r = PARAMS.pointSize * sm * (ap?1.33:1) * sc;
        ctx.fillStyle = COLORS.point;
        ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2); ctx.fill();
        if (ap) {
            ctx.globalAlpha=0.3; ctx.beginPath(); ctx.arc(s.x,s.y,r*2,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
        }
    });
}

function animate() { render(); requestAnimationFrame(animate); }
animate();

// ============================================================
// HIT TESTING
// ============================================================

function hitPt(wx,wy) {
    var t=THRESHOLDS.pointHitRadius/viewScale;
    var found=null;
    points.forEach(function(p) { if (dist(wx,wy,p.x,p.y)<t) found=p; });
    return found;
}

function hitLC(wx,wy) {
    var cT=THRESHOLDS.circleHitRadius/viewScale, sT=THRESHOLDS.lineHitRadius/viewScale;
    var bA=null, bAd=Infinity;
    logicalArcs.forEach(function(arc) {
        var ci=circles.get(arc.circIdx),ce=points.get(ci.centerId);
        var d=Math.abs(dist(wx,wy,ce.x,ce.y)-ci.radius);
        if (d>=cT||d>=bAd) return;
        var pA=points.get(arc.pointAId),pB=points.get(arc.pointBId);
        if (angleBetween(getAngle(wx,wy,ce),getAngle(pA.x,pA.y,ce),getAngle(pB.x,pB.y,ce))) { bA=arc; bAd=d; }
    });
    if (bA) return { type:'arc', obj:bA };
    var bC=null, bCd=Infinity;
    circles.forEach(function(ci) {
        if (ci.pointsOnCircle.length>=2) return;
        var ce=points.get(ci.centerId);
        var d=Math.abs(dist(wx,wy,ce.x,ce.y)-ci.radius);
        if (d<cT&&d<bCd) { bC=ci; bCd=d; }
    });
    if (bC) return { type:'circle', obj:bC };
    var bS=null, bSd=Infinity;
    logicalSegments.forEach(function(seg) {
        var A=points.get(seg.pointAId),B=points.get(seg.pointBId);
        var cx=B.x-A.x,cy=B.y-A.y,lq=cx*cx+cy*cy; if (!lq) return;
        var pv=Math.max(0,Math.min(1,((wx-A.x)*cx+(wy-A.y)*cy)/lq));
        var d=dist(wx,wy,A.x+pv*cx,A.y+pv*cy);
        if (d<sT&&d<bSd) { bS=seg; bSd=d; }
    });
    if (bS) return { type:'segment', obj:bS };
    return null;
}

function hitAnyLine(wx,wy) {
    var t=THRESHOLDS.lineHitRadius/viewScale, found=false;
    lines.forEach(function(l) {
        var p1=points.get(l.p1Id),p2=points.get(l.p2Id);
        var dx=p2.x-p1.x,dy=p2.y-p1.y,lq=dx*dx+dy*dy; if (!lq) return;
        var tv=((wx-p1.x)*dx+(wy-p1.y)*dy)/lq;
        if (dist(wx,wy,p1.x+tv*dx,p1.y+tv*dy)<t) found=true;
    });
    return found;
}

function findSnap(cp,cr) {
    var t=THRESHOLDS.snapDistance/viewScale,b=null,bd=Infinity;
    points.forEach(function(p) {
        if (p.id===cp.id) return;
        var d=Math.abs(dist(cp.x,cp.y,p.x,p.y)-cr);
        if (d<t&&d<bd) { b=p; bd=d; }
    });
    return b;
}

// ============================================================
// INTERACTION STATE MACHINE
// ============================================================

var interactionState='IDLE', selectedPoint=null, firstTapPoint=null;
var ghostLineEnd=null, ghostCircle=null, snapTarget=null;
var pointerStart=null, lastTapTime=0, lastTapTarget=null;
var isPanning=false, panStart=null;

function getPos(e) {
    var r=canvas.getBoundingClientRect();
    var src=(e.touches&&e.touches.length)?e.touches[0]:e;
    return { x:src.clientX-r.left, y:src.clientY-r.top };
}

function onDown(e) {
    if (e.target !== canvas) return;   // HTML panel elements absorb their own events
    e.preventDefault(); unlockAudio();
    var pos=getPos(e), world=s2w(pos.x,pos.y);
    pointerStart=pos;
    var hp=hitPt(world.x,world.y);
    if (hp) { selectedPoint=hp; interactionState=(interactionState==='AWAITING_SECOND_TAP')?'AWAITING_SECOND_TAP':'POINT_PRESSED'; return; }
    var hl=hitLC(world.x,world.y);
    if (hl) { lastTapTarget=hl; return; }
    if (interactionState==='AWAITING_SECOND_TAP') { ghostLineEnd=null; firstTapPoint=null; interactionState='IDLE'; selectedPoint=null; return; }
    isPanning=true; panStart={ x:viewX,y:viewY,sx:pos.x,sy:pos.y };
}

function onMove(e) {
    e.preventDefault();
    var pos=getPos(e), world=s2w(pos.x,pos.y);
    if (isPanning && panStart) { viewX=panStart.x-(pos.x-panStart.sx)/viewScale; viewY=panStart.y-(pos.y-panStart.sy)/viewScale; return; }
    if (interactionState==='POINT_PRESSED' && dist(pointerStart.x,pointerStart.y,pos.x,pos.y)>THRESHOLDS.tapMovement) interactionState='DRAGGING_CIRCLE';
    if (interactionState==='DRAGGING_CIRCLE' && selectedPoint) {
        var r=dist(selectedPoint.x,selectedPoint.y,world.x,world.y);
        ghostCircle={ center:selectedPoint,radius:r };
        var prev=snapTarget; snapTarget=findSnap(selectedPoint,r);
        if (snapTarget) { ghostCircle.radius=dist(selectedPoint.x,selectedPoint.y,snapTarget.x,snapTarget.y); if (!prev||prev.id!==snapTarget.id) playSound('snap'); }
    }
    if (interactionState==='AWAITING_SECOND_TAP' && firstTapPoint) ghostLineEnd=pos;
}

function onUp(e) {
    e.preventDefault(); unlockAudio();
    var pos=getPos(e), world=s2w(pos.x,pos.y), now=Date.now();

    if (isPanning) {
        var moved=dist(pointerStart.x,pointerStart.y,pos.x,pos.y);
        isPanning=false; panStart=null;
        if (moved < THRESHOLDS.tapMovement) {
            if (hitAnyLine(world.x,world.y)) return;
            if (now-lastTapTime < THRESHOLDS.doubleClickTime) { if (confirm('Start a new construction?')) newConstruction(); lastTapTime=0; }
            else { undoOp(); lastTapTime=now; }
        }
        return;
    }

    var moved=dist(pointerStart.x,pointerStart.y,pos.x,pos.y), isTap=(moved<THRESHOLDS.tapMovement);

    if (isTap && interactionState==='IDLE' && !hitPt(world.x,world.y)) {
        // Palette-driven region interaction
        var activeColor = getActiveColor();
        if (activeColor === null) {
            // Empty swatch -- dissolve fill under tap
            var hf = hitFilledRegion(world.x,world.y);
            if (hf) { dissolveRegion(hf.fillId); playSound('repaint'); return; }
        } else if (!state.palette.leadActive) {
            // Color swatch -- recolor fill under tap
            var hf = hitFilledRegion(world.x,world.y);
            if (hf) { recolorRegion(hf.fillId, activeColor, 1.0); playSound('repaint'); return; }
        }

        // Standard construction tap
        var hit=hitLC(world.x,world.y);
        if (hit) {
            var same=false;
            if (lastTapTarget && hit.type===lastTapTarget.type && now-lastTapTime<THRESHOLDS.doubleClickTime) {
                if (hit.type==='segment') same=(hit.obj.pointAId===lastTapTarget.obj.pointAId&&hit.obj.pointBId===lastTapTarget.obj.pointBId);
                else if (hit.type==='arc')  same=(hit.obj.pointAId===lastTapTarget.obj.pointAId&&hit.obj.pointBId===lastTapTarget.obj.pointBId);
                else if (hit.type==='circle') same=(hit.obj.logIdx===lastTapTarget.obj.logIdx);
            }
            if (same) {
                undoOp();
                if (hit.type==='segment') { var l=lines.get(hit.obj.lineIdx); if (l) { appendOp({ op:'scaffold',target:'line',idx:hit.obj.lineIdx,value:!l.isScaffold }); playSound(lines.get(hit.obj.lineIdx).isScaffold?'scaffold_fade':'scaffold_restore'); } }
                else if (hit.type==='arc') { var ci=circles.get(hit.obj.circIdx); if (ci) { appendOp({ op:'scaffold',target:'circle',idx:hit.obj.circIdx,value:!ci.isScaffold }); playSound(circles.get(hit.obj.circIdx).isScaffold?'scaffold_fade':'scaffold_restore'); } }
                else if (hit.type==='circle') { appendOp({ op:'scaffold',target:'circle',idx:hit.obj.logIdx,value:!hit.obj.isScaffold }); playSound(circles.get(hit.obj.logIdx).isScaffold?'scaffold_fade':'scaffold_restore'); }
                lastTapTarget=null; lastTapTime=0;
            } else {
                var key=null;
                if      (hit.type==='segment') key=hit.obj.lineIdx+':'+hit.obj.pointAId+':'+hit.obj.pointBId;
                else if (hit.type==='arc')     key=hit.obj.circIdx+':'+hit.obj.pointAId+':'+hit.obj.pointBId;
                if (key) {
                    var was=hit.obj.isEmphasized;
                    appendOp({ op:was?'deemphasize':'emphasize', key:key });
                    if (was) { checkAndDissolve(key); playSound('emphasis_off'); }
                    else { var fb=fills.size; checkAndFill(); playSound(fills.size>fb?'fill':'emphasis_on'); }
                }
                lastTapTarget=hit; lastTapTime=now;
            }
            return;
        }
    }

    if (interactionState==='POINT_PRESSED' && isTap && selectedPoint) {
        firstTapPoint=selectedPoint; interactionState='AWAITING_SECOND_TAP'; selectedPoint=null; lastTapTarget=null; return;
    }
    if (interactionState==='AWAITING_SECOND_TAP' && isTap) {
        var hp2=hitPt(world.x,world.y);
        if (hp2 && hp2.id!==firstTapPoint.id) { appendOp({ op:'line',p1Id:firstTapPoint.id,p2Id:hp2.id }); playSound('line'); }
        ghostLineEnd=null; firstTapPoint=null; interactionState='IDLE'; selectedPoint=null; return;
    }
    if (interactionState==='DRAGGING_CIRCLE') {
        if (snapTarget && selectedPoint) {
            var dup=false;
            circles.forEach(function(c) { if (c.centerId===selectedPoint.id&&c.edgeId===snapTarget.id) dup=true; });
            if (!dup) { appendOp({ op:'circle',centerId:selectedPoint.id,edgeId:snapTarget.id }); playSound('circle'); }
        }
        ghostCircle=null; snapTarget=null; selectedPoint=null; interactionState='IDLE'; return;
    }
    interactionState='IDLE'; selectedPoint=null; firstTapPoint=null; ghostLineEnd=null; ghostCircle=null; snapTarget=null;
}

function dispatch(action) {
    switch(action) {
        case 'save-construction': saveConstruction(); break;
        case 'save-image':        exportImage(); break;
        case 'load':              loadConstruction(); break;
        case 'new':               if (confirm('Start a new construction?')) newConstruction(); break;
        case 'labels':            toast('Labels -- not yet implemented'); break;
        case 'toggle-lines':      toggleLines(); break;
        case 'open-color':        openColorTool(); break;
        case 'open-drawing-guide':openDrawingGuide(); break;
        case 'toggle-glass':      toggleGlass(); break;
        case 'share':             toast('Share -- not yet implemented'); break;
    }
    setTimeout(collapseMenu, 120);
}

function exportImage() {
    if (points.size===0) { alert('Nothing to export.'); return; }
    var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    points.forEach(function(pt) { minX=Math.min(minX,pt.x);minY=Math.min(minY,pt.y);maxX=Math.max(maxX,pt.x);maxY=Math.max(maxY,pt.y); });
    var pad=60,ww=maxX-minX+pad*2,wh=maxY-minY+pad*2;
    var sc=Math.min(1200/ww,900/wh,3), pw=Math.round(ww*sc), ph=Math.round(wh*sc);
    var off=document.createElement('canvas'); off.width=pw; off.height=ph;
    var oc=off.getContext('2d'); oc.fillStyle=COLORS.background; oc.fillRect(0,0,pw,ph);
    function wp(wx,wy) { return { x:(wx-minX+pad)*sc, y:(wy-minY+pad)*sc }; }
    fills.forEach(function(f) {
        if (f.dissolved) return;
        var poly=expandFillToPolygon(f).map(function(p) { return wp(p.x,p.y); });
        if (poly.length<3) return;
        oc.beginPath(); oc.moveTo(poly[0].x,poly[0].y);
        for (var i=1;i<poly.length;i++) oc.lineTo(poly[i].x,poly[i].y);
        oc.closePath(); oc.fillStyle=f.color; oc.globalAlpha=f.opacity; oc.fill('evenodd'); oc.globalAlpha=1;
    });
    off.toBlob(function(blob) {
        var url=URL.createObjectURL(blob),a=document.createElement('a');
        a.href=url; a.download='construction.png'; a.click(); URL.revokeObjectURL(url);
    },'image/png');
}

function layoutPanelTools() {
    var menuBottom = TOOLS_TOP + toolsRoot.offsetHeight;
    var cursor = menuBottom + TOOLS_PANEL_GAP;
    state.panelTools.forEach(function(id) {
        var el = getPanelToolEl(id);
        if (!el || el.style.display==='none') return;
        el.style.top = cursor+'px'; cursor += el.offsetHeight + PANEL_TOOL_GAP;
    });
    if (!state.rememberManual) {
        if (state.panelTools.length > 0) { remember.style.top=(cursor+REMEMBER_GAP)+'px'; remember.style.transform='none'; }
        else { remember.style.top='50%'; remember.style.transform='translateY(-50%)'; }
    }
}

function getPanelToolEl(id) {
    if (id==='palette') return toolPalette;
    if (id==='model')   return toolModel;
    return null;
}

function openPanelTool(id) {
    if (state.workspaceTools[id]) { pulseWorkspaceTool(id); return; }
    if (state.panelTools.includes(id)) return;
    if (state.panelTools.length >= 2) closePanelTool(state.panelTools[0]);
    state.panelTools.push(id);
    var el = getPanelToolEl(id); if (!el) return;
    leftPanel.style.width = PANEL_WIDE_WIDTH+'px'; leftPanel.style.minWidth = PANEL_WIDE_WIDTH+'px';
    el.style.display='block'; el.classList.remove('visible');
    layoutPanelTools();
    setTimeout(function() { layoutPanelTools(); el.classList.add('visible'); }, 420);
    enablePanelToolDrag(el, id);
}

function closePanelTool(id) {
    var idx = state.panelTools.indexOf(id); if (idx===-1) return;
    state.panelTools.splice(idx,1);
    var el = getPanelToolEl(id); if (!el) return;
    el.classList.remove('visible');
    setTimeout(function() {
        el.style.display='none'; layoutPanelTools();
        if (state.panelTools.length===0) { leftPanel.style.width=PANEL_BASE_WIDTH+'px'; leftPanel.style.minWidth=PANEL_BASE_WIDTH+'px'; }
    }, 220);
}

function enablePanelToolDrag(el, id) {
    var handle = el.querySelector('.panel-tool-header');
    if (!handle || handle._dragBound) return; handle._dragBound=true;
    var dragging=false, sx, sy;
    handle.addEventListener('mousedown', function(e) { if (e.target.classList.contains('panel-tool-close')) return; e.preventDefault(); dragging=true; sx=e.clientX; sy=e.clientY; });
    document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        if (Math.abs(e.clientX-sx)>30 || Math.abs(e.clientY-sy)>20) { dragging=false; pinToWorkspace(id,e.clientX,e.clientY); }
    });
    document.addEventListener('mouseup', function() { dragging=false; });
}

function pinToWorkspace(id, dropX, dropY) {
    closePanelTool(id);
    var el = buildWorkspaceTool(id); if (!el) return;
    el.style.left = Math.max(dropX-100,230)+'px'; el.style.top = Math.max(dropY-20,20)+'px';
    document.body.appendChild(el); state.workspaceTools[id]=el; makeWorkspaceDraggable(el,id);
}

function makeWorkspaceDraggable(el, id) {
    var header = el.querySelector('.workspace-tool-header'); if (!header) return;
    var dragging=false,sx,sy,ox,oy;
    header.addEventListener('mousedown', function(e) { if (e.target.classList.contains('workspace-tool-close')) return; e.preventDefault(); dragging=true; sx=e.clientX; sy=e.clientY; ox=parseInt(el.style.left); oy=parseInt(el.style.top); });
    document.addEventListener('mousemove', function(e) { if (!dragging) return; el.style.left=(ox+e.clientX-sx)+'px'; el.style.top=(oy+e.clientY-sy)+'px'; });
    document.addEventListener('mouseup', function() { dragging=false; });
}

function buildWorkspaceTool(id) {
    if (id==='palette') return buildWorkspacePalette();
    if (id==='model')   return buildWorkspaceModel();
    return null;
}

function pulseWorkspaceTool(id) {

}

        var wt=state.workspaceTools['palette'];
        wt.querySelector('.workspace-tool-title').textContent=pal.name;
        buildPaletteSwatches(paletteId,wt.querySelector('.palette-grid'));
        buildCraftRow(wt.querySelector('.craft-row'));
        pulseWorkspaceTool('palette'); return;
    }
    openPanelTool('palette');
    setTimeout(function() { buildPaletteSwatches(paletteId,document.getElementById('palette-grid')); buildCraftRow(document.getElementById('craft-row')); }, 450);
}

document.getElementById('palette-name-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    var sw = document.getElementById('palette-switcher');
    if (sw.style.display==='none') openPaletteSwitcher(); else closePaletteSwitcher();
});

function openPaletteSwitcher() {
    var sw = document.getElementById('palette-switcher'); sw.innerHTML='';
    PALETTE_SHORTLIST.forEach(function(id) {
        var p=PALETTES_DATA[id]; if (!p) return;
        var item=document.createElement('span');
        item.className='palette-switch-item'+(id===state.palette.current?' current':'');
        item.textContent=p.name;
        item.addEventListener('click', function(e) { e.stopPropagation(); openPaletteTool(id); });
        sw.appendChild(item);
    });
    var choose=document.createElement('span'); choose.className='palette-switch-item choose'; choose.textContent='Choose...';
    choose.addEventListener('click', function(e) { e.stopPropagation(); closePaletteSwitcher(); openPickerWindow('palettes'); });
    sw.appendChild(choose);
    sw.style.display='block';
    document.getElementById('palette-grid').style.visibility='hidden';
    document.getElementById('craft-row').style.visibility='hidden';
    document.getElementById('palette-recipe').style.visibility='hidden';
}

function closePaletteSwitcher() {
    var sw=document.getElementById('palette-switcher'); if (!sw) return;
    sw.style.display='none';
    document.getElementById('palette-grid').style.visibility='';
    document.getElementById('craft-row').style.visibility='';
    document.getElementById('palette-recipe').style.visibility='';
}

function setRecipe(text) { var el=document.getElementById('palette-recipe'); if (el) el.textContent=text||'\u00a0'; }

function buildPaletteSwatches(paletteId, grid) {
    var pal=PALETTES_DATA[paletteId]; if (!pal||!grid) return;
    grid.innerHTML=''; grid.classList.toggle('wide',pal.colors.length>12);
    if (state.palette.leadActive) grid.classList.add('lead-active');
    pal.colors.forEach(function(c) {
        var sw=document.createElement('div'); sw.className='palette-swatch'; sw.style.background=c.hex;
        var recipe=c.uncertain?c.recipe+'?':c.recipe;
        sw.addEventListener('mouseenter', function() { setRecipe(recipe); });
        sw.addEventListener('mouseleave', function() { setRecipe(''); });
        sw.addEventListener('click', function() {
            state.palette.selected=c.hex;
            document.querySelectorAll('#palette-grid .palette-swatch, #craft-row .palette-swatch').forEach(function(s) { s.classList.remove('selected'); });
            sw.classList.add('selected'); setRecipe(recipe);
        });
        if (state.palette.selected===c.hex) sw.classList.add('selected');
        grid.appendChild(sw);
    });
}

function buildCraftRow(row) {
    if (!row) return; row.innerHTML='';
    CRAFT_SWATCHES.forEach(function(c) {
        var wrap=document.createElement('div'); wrap.className='craft-swatch-wrap';
        var sw=document.createElement('div'); sw.className='palette-swatch';
        if      (c.label==='empty') { sw.style.background='#f4f1e8'; sw.style.border='1px dashed #c8b89a'; }
        else if (c.label==='lead')  { sw.classList.add('swatch-lead'); }
        else                        { sw.style.background=c.hex; }
        sw.addEventListener('mouseenter', function() { setRecipe(c.recipe); });
        sw.addEventListener('mouseleave', function() { setRecipe(''); });
        sw.addEventListener('click', function() {
            if (c.label==='lead') {
                state.palette.leadActive=!state.palette.leadActive;
                sw.classList.toggle('selected',state.palette.leadActive);
                applyLeadState();
            } else {
                state.palette.selected=c.hex;
                document.querySelectorAll('#palette-grid .palette-swatch, #craft-row .palette-swatch').forEach(function(s) { if (!s.classList.contains('swatch-lead')) s.classList.remove('selected'); });
                sw.classList.add('selected');
            }
            setRecipe(c.recipe);
        });
        if (c.label==='lead' && state.palette.leadActive) sw.classList.add('selected');
        wrap.appendChild(sw);
        if (c.label==='clear'||c.label==='lead') {
            var lbl=document.createElement('span'); lbl.className='craft-swatch-label'; lbl.textContent=c.label; wrap.appendChild(lbl);
        }
        row.appendChild(wrap);
    });
}

function applyLeadState() {
    document.querySelectorAll('.palette-grid,.craft-row').forEach(function(g) { g.classList.toggle('lead-active',state.palette.leadActive); });
}

document.getElementById('palette-close').addEventListener('click', function() { closePanelTool('palette'); });

function buildWorkspacePalette() {
    var pal=PALETTES_DATA[state.palette.current]||{ name:'--' };
    var el=document.createElement('div'); el.className='workspace-tool';
    el.innerHTML='<div class="workspace-tool-header"><span class="workspace-tool-title">'+pal.name+'</span><span class="workspace-tool-close">close</span></div><div class="palette-grid"></div><div class="craft-row"></div><div class="palette-recipe">&nbsp;</div>';
    buildPaletteSwatches(state.palette.current, el.querySelector('.palette-grid'));
    buildCraftRow(el.querySelector('.craft-row'));
    el.querySelector('.workspace-tool-close').addEventListener('click', function() { el.remove(); delete state.workspaceTools['palette']; });
    return el;
}

// ============================================================
// DRAWING GUIDE TOOL
// ============================================================

function openDrawingGuide() { if (!state.model.current) loadModel(MODELS[0]); openPanelTool('model'); }

function loadModel(modelObj) {
    state.model.current = modelObj;
    var svgStr = SVG_CACHE[modelObj.file];
    if (svgStr) {
        var blob = new Blob([svgStr],{type:'image/svg+xml'}), url=URL.createObjectURL(blob);
        modelImg.onload = function() { URL.revokeObjectURL(url); state.model.visible=true; modelLayer.style.display='block'; applyModelTransform(); setModelNameBtn(modelObj.name); };
        modelImg.src = url;
    } else {
        modelImg.onload = function() { state.model.visible=true; modelLayer.style.display='block'; applyModelTransform(); setModelNameBtn(modelObj.name); };
        modelImg.src = modelObj.path;
    }
}

function clearModel() { state.model.current=null; state.model.visible=false; modelLayer.style.display='none'; closePanelTool('model'); }
function applyModelTransform() { modelImg.style.transform='translate(calc(-50% + '+state.model.x+'px), calc(-50% + '+state.model.y+'px)) scale('+state.model.scale+')'; modelImg.style.opacity=state.model.opacity; }

var modelNameIsChooser=false;
function setModelNameBtn(name) { var b=document.getElementById('model-name-btn'); if (b) { b.textContent=name; modelNameIsChooser=false; } }
function enterChooserMode() { var b=document.getElementById('model-name-btn'); if (b) { b.textContent='Choose'; modelNameIsChooser=true; openPickerWindow('models'); } }
function exitChooserMode() { setModelNameBtn(state.model.current?state.model.current.name:'None'); }

document.getElementById('model-name-btn').addEventListener('click', function(e) { e.stopPropagation(); if (!modelNameIsChooser) enterChooserMode(); });
document.getElementById('model-close').addEventListener('click', function() { closePanelTool('model'); });
document.getElementById('model-opacity').addEventListener('input', function(e) { state.model.opacity=e.target.value/100; applyModelTransform(); });
document.getElementById('model-scale').addEventListener('input', function(e) { state.model.scale=e.target.value/100; applyModelTransform(); });

var mdDragging=false,mdSX,mdSY,mdOX,mdOY;
modelImg.addEventListener('mousedown', function(e) { e.preventDefault(); mdDragging=true; mdSX=e.clientX; mdSY=e.clientY; mdOX=state.model.x; mdOY=state.model.y; modelImg.style.cursor='grabbing'; });
document.addEventListener('mousemove', function(e) { if (!mdDragging) return; state.model.x=mdOX+(e.clientX-mdSX); state.model.y=mdOY+(e.clientY-mdSY); applyModelTransform(); });
document.addEventListener('mouseup', function() { if (!mdDragging) return; mdDragging=false; modelImg.style.cursor='move'; });
modelImg.addEventListener('wheel', function(e) { e.preventDefault(); state.model.scale=Math.max(0.1,Math.min(4,state.model.scale-e.deltaY*0.001)); var sl=document.getElementById('model-scale'); if (sl) sl.value=Math.round(state.model.scale*100); applyModelTransform(); }, {passive:false});

function buildWorkspaceModel() {
    var el=document.createElement('div'); el.className='workspace-tool';
    var m=state.model.current;
    el.innerHTML='<div class="workspace-tool-header"><span class="workspace-tool-title ws-model-name" style="cursor:default;">'+(m?m.name:'--')+'</span><span class="workspace-tool-close">close</span></div><span style="font:italic 11px Georgia;color:#9a8e80;display:block;margin-bottom:10px;">click and drag to reposition</span><div class="cw-slider-row"><span class="cw-slider-label">scale</span><input type="range" class="cw-slider" min="10" max="400" value="'+Math.round(state.model.scale*100)+'" step="1"></div><div class="cw-slider-row"><span class="cw-slider-label">opacity</span><input type="range" class="cw-slider" min="5" max="100" value="'+Math.round(state.model.opacity*100)+'" step="1"></div>';
    var sliders=el.querySelectorAll('input.cw-slider');
    sliders[0].addEventListener('input', function(e) { state.model.scale=e.target.value/100; var ps=document.getElementById('model-scale'); if (ps) ps.value=e.target.value; applyModelTransform(); });
    sliders[1].addEventListener('input', function(e) { state.model.opacity=e.target.value/100; var ps=document.getElementById('model-opacity'); if (ps) ps.value=e.target.value; applyModelTransform(); });
    el.querySelector('.ws-model-name').addEventListener('click', function() { enterChooserMode(); });
    el.querySelector('.workspace-tool-close').addEventListener('click', function() { el.remove(); delete state.workspaceTools['model']; });
    return el;
}

// ============================================================
// PICKER WINDOW
// ============================================================

var pickerBackdrop = document.getElementById('picker-backdrop');
var pickerWindow   = document.getElementById('picker-window');
var pickerGrid     = document.getElementById('picker-grid');
var pickerMode = 'models';

function openPickerWindow(mode) {
    pickerMode = mode||'models';
    if (pickerMode==='palettes') buildPickerPalettes(); else buildPickerModels();
    positionPicker();
    pickerBackdrop.classList.add('visible');
    requestAnimationFrame(function() { requestAnimationFrame(function() { pickerWindow.classList.add('visible'); }); });
}

function closePicker() {
    pickerWindow.classList.remove('visible');
    setTimeout(function() { pickerBackdrop.classList.remove('visible'); },200);
    if (pickerMode==='models') exitChooserMode();
}

pickerBackdrop.addEventListener('click', closePicker);
document.getElementById('picker-close-btn').addEventListener('click', function(e) { e.stopPropagation(); closePicker(); });

(function() {
    var handle=document.getElementById('picker-drag-handle'), dragging=false, sx,sy,ox,oy;
    handle.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); dragging=true; sx=e.clientX; sy=e.clientY; ox=parseInt(pickerWindow.style.left)||pickerWindow.getBoundingClientRect().left; oy=parseInt(pickerWindow.style.top)||pickerWindow.getBoundingClientRect().top; });
    document.addEventListener('mousemove', function(e) { if (!dragging) return; pickerWindow.style.left=(ox+e.clientX-sx)+'px'; pickerWindow.style.top=(oy+e.clientY-sy)+'px'; });
    document.addEventListener('mouseup', function() { dragging=false; });
})();

function positionPicker() {
    var panelW=parseInt(leftPanel.style.width)||PANEL_BASE_WIDTH;
    var canvasW=window.innerWidth-panelW, canvasH=window.innerHeight;
    pickerWindow.style.left=(panelW+(canvasW-660)/2)+'px';
    pickerWindow.style.top=((canvasH-300)/2)+'px';
}

function buildPickerModels() {
    pickerGrid.innerHTML='';
    var noneItem=document.createElement('div'); noneItem.className='picker-item';
    var noneThumb=document.createElement('div'); noneThumb.className='picker-thumb';
    if (!state.model.current) noneThumb.classList.add('selected');
    noneThumb.style.background='rgba(200,184,154,0.12)';
    var noneLabel=document.createElement('div'); noneLabel.className='picker-item-name'; noneLabel.textContent='None';
    noneItem.appendChild(noneThumb); noneItem.appendChild(noneLabel);
    noneThumb.addEventListener('click', function() { pickerWindow.classList.remove('visible'); setTimeout(function(){pickerBackdrop.classList.remove('visible');},200); modelNameIsChooser=false; clearModel(); });
    pickerGrid.appendChild(noneItem);
    MODELS.forEach(function(m) {
        var item=document.createElement('div'); item.className='picker-item';
        var thumb=document.createElement('div'); thumb.className='picker-thumb';
        if (state.model.current&&state.model.current.file===m.file) thumb.classList.add('selected');
        var svgStr=SVG_CACHE[m.file];
        if (svgStr) {
            var parser=new DOMParser(),doc=parser.parseFromString(svgStr,'image/svg+xml'),svg=doc.querySelector('svg');
            if (svg) { svg.removeAttribute('width'); svg.removeAttribute('height'); svg.style.width='184px'; svg.style.height='184px'; svg.querySelectorAll('[stroke]').forEach(function(el){el.setAttribute('stroke-width','8');}); thumb.appendChild(svg); }
        }
        var label=document.createElement('div'); label.className='picker-item-name'; label.textContent=m.name;
        item.appendChild(thumb); item.appendChild(label);
        thumb.addEventListener('click', function() { loadModel(m); openPanelTool('model'); pickerWindow.classList.remove('visible'); setTimeout(function(){pickerBackdrop.classList.remove('visible');},200); modelNameIsChooser=false; });
        pickerGrid.appendChild(item);
    });
}

function buildPickerPalettes() {
    pickerGrid.innerHTML=''; pickerGrid.style.gridTemplateColumns='repeat(3,200px)';
    Object.keys(PALETTES_DATA).forEach(function(id) {
        var pal=PALETTES_DATA[id]; if (!pal.source) return;
        var item=document.createElement('div'); item.className='picker-item';
        var thumb=document.createElement('div'); thumb.className='picker-thumb';
        if (pal.id===state.palette.current) thumb.classList.add('selected');
        var img=document.createElement('img');
        img.src='../art/'+encodeURIComponent(pal.source); img.alt=pal.name;
        img.style.cssText='width:184px;height:184px;object-fit:contain;pointer-events:none;border-radius:2px;';
        img.onerror=function(){thumb.style.background='rgba(200,184,154,0.2)';};
        thumb.appendChild(img);
        var label=document.createElement('div'); label.className='picker-item-name'; label.textContent=pal.name;
        item.appendChild(thumb); item.appendChild(label);
        thumb.addEventListener('click', function() { openPaletteTool(pal.id); pickerGrid.querySelectorAll('.picker-thumb').forEach(function(t){t.classList.remove('selected');}); thumb.classList.add('selected'); });
        pickerGrid.appendChild(item);
    });
}

// ============================================================
// REMEMBER INSCRIPTION
// ============================================================

var remDragging=false, remSX, remSY, remOX, remOY;

remember.addEventListener('mousedown', function(e) {
    e.preventDefault();
    if (!state.rememberManual) { var rect=remember.getBoundingClientRect(); remember.style.top=rect.top+'px'; remember.style.transform='none'; }
    remDragging=true; state.rememberManual=true;
    remSX=e.clientX; remSY=e.clientY;
    remOX=parseInt(remember.style.left)||16; remOY=parseInt(remember.style.top)||remember.getBoundingClientRect().top;
    remember.classList.add('dragging'); dragHint.classList.add('faded');
});
document.addEventListener('mousemove', function(e) { if (!remDragging) return; remember.style.left=(remOX+e.clientX-remSX)+'px'; remember.style.top=(remOY+e.clientY-remSY)+'px'; });
document.addEventListener('mouseup', function() { if (!remDragging) return; remDragging=false; remember.classList.remove('dragging'); });

setTimeout(function() {
    var rect=remember.getBoundingClientRect();
    dragHint.style.left='16px'; dragHint.style.top=(rect.bottom+6)+'px';
}, 200);
setTimeout(function() { dragHint.classList.add('faded'); }, 4000);

// ============================================================
// LAYOUT ENGINE
// ============================================================

var menuObserver=new MutationObserver(function() { setTimeout(layoutPanelTools,160); });
menuObserver.observe(toolsL2,{attributes:true,attributeFilter:['class']});
document.querySelectorAll('.l3-list').forEach(function(l3) { menuObserver.observe(l3,{attributes:true,attributeFilter:['class']}); });
window.addEventListener('resize', layoutPanelTools);
setTimeout(layoutPanelTools, 50);

// ============================================================
// UTILITY
// ============================================================

function toast(msg) {
    var t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#546A80;color:#f4f1e8;padding:6px 18px;border-radius:20px;font:12px Georgia;z-index:10003;pointer-events:none;';
    t.textContent=msg; document.body.appendChild(t); setTimeout(function(){t.remove();},2200);
}

// ============================================================
// STARTUP
// ============================================================

loadPalettesJSON();
initLog();

}); // end DOMContentLoaded
</script>
